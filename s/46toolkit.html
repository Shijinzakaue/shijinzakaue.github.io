<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>坂道TOOLKIT</title>
  <link rel="icon" href="LOGO.png" type="image/png" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rampart+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111216;
      --panel: #1a1b21;
      --panel-2: #20222b;
      --text: #eceef7;
      --muted: #9ca3af;
      --accent: #933AFD;
      --nogi: #9E3EB2;
      --saku: #F19DB5;
      --hina: #5BBEE5;
      --card-width: 360px;
      --grid-gap: 16px;
      --content-max: calc(var(--card-width) * 3 + var(--grid-gap) * 2);
      --logo-safe: 64px;
      --dock-btn-size: 60px;
      --dock-rail-width: calc(var(--dock-btn-size) + 14px);
      --dock-gap: 8px;
      --fab-size: 66px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --overlay-light: rgba(255,255,255,.02);
      --overlay-light-hover: rgba(255,255,255,.05);
      --overlay-light-active: rgba(255,255,255,.08);
      --overlay-light-strong: rgba(255,255,255,.1);
      --overlay-dark: rgba(30,28,40,.6);
      --official-card: rgba(36,32,50,.85);
      --lang-menu-bg: rgba(20,21,31,.95);
    }
    html[data-theme="light"] {
      --bg: #f0e5f5;
      --panel: #e9e4fc;
      --panel-2: #f0e5f5;
      --text: #1a1a1a;
      --muted: #666666;
      --overlay-light: rgba(0,0,0,.02);
      --overlay-light-hover: rgba(0,0,0,.05);
      --overlay-light-active: rgba(0,0,0,.08);
      --overlay-light-strong: rgba(0,0,0,.1);
      --overlay-dark: rgba(242,238,255,.8);
      --official-card: rgba(237,231,246,.95);
      --lang-menu-bg: #e9e4fc;
    }

    * { box-sizing: border-box; }
    html { -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }
    body.sheet-open { overflow: hidden; }

    /* Prevent mobile blue tap highlight / text selection on controls */
    .dock-btn,
    .fab,
    .main-logo,
    .expand,
    .official-expand,
    .clear-filters-btn,
    .language-trigger,
    .language-option {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .top-zone {
      position: sticky;
      top: 0;
      z-index: 60;
      width: 100%;
      background: linear-gradient(to bottom, rgba(147, 58, 253, 0.4) 0%, transparent 100%);
      padding: 16px 0 32px;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }
    .top-zone-inner {
      position: relative;
      width: 100%;
      max-width: var(--content-max);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: auto;
      padding: 0 12px;
      box-sizing: border-box;
      flex-wrap: nowrap;
    }

    .main-logo {
      position: fixed;
      top: 16px;
      left: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      overflow: hidden;
      box-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .main-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-title {
      position: fixed;
      top: 40px;
      left: calc(24px + 48px + 16px);
      transform: translateY(-50%);
      font-family: 'Rampart One', 'Noto Sans TC', cursive;
      font-size: 30px;
      letter-spacing: 0.5px;
      color: var(--text);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      z-index: 35;
      pointer-events: none;
      line-height: 1;
      transition: opacity .2s ease;
    }
    .site-title.hidden { display: none !important; }

    @media (max-width: 1200px) {
      .site-title { display: none; }
    }
    @media (max-width: 600px) {
      .site-title {
        left: 50%;
        top: 40px;
        transform: translate(-50%, -50%);
        font-size: 30px;
        width: calc(100% - 64px);
        text-align: center;
      }
      .site-title.mobile-visible { display: block !important; }
    }

    .search-wrap {
      flex: 0 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 280px;
      margin: 0 auto;
      z-index: 2;
    }
    .search-pill {
      width: min(48vw, 440px);
      max-width: 440px;
      height: 48px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      padding: 0 48px 0 24px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
    }
    .search-pill:focus-within {
      border-color: color-mix(in oklab, var(--accent) 75%, white 25%);
      box-shadow: 0 0 0 3px rgba(147,58,253,.25);
    }

    #searchInput {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
      min-width: 0;
    }
    #searchInput::placeholder {
      color: var(--muted);
    }

    .search-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      position: absolute;
      right: 44px; /* Move search count inside */
    }
    #searchCount { 
      font-size: 13px; 
      color: var(--muted); 
      min-width: 38px; 
      text-align: right; 
      display: none;
    }

    #clearBtn {
      position: absolute;
      right: 8px;
      border: none;
      background: transparent;
      color: var(--muted);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      display: none;
      place-items: center;
      transition: background .15s ease, color .15s ease;
      font-size: 0;
    }
    #clearBtn.visible { display: grid; }
    #clearBtn:hover { background: var(--overlay-light-hover); color: var(--text); }
    #clearBtn .material-icons { font-size: 18px; line-height: 1; }

    .search-icon {
      display: none;
      color: var(--muted);
      font-size: 24px;
    }

    .language-control {
      position: relative;
      display: inline-flex;
      align-items: center;
      height: 42px;
      min-width: 112px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.02);
      padding: 0;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .language-control:not(.open):hover {
      border-color: rgba(255,255,255,.3);
      background: rgba(255,255,255,.05);
      box-shadow: 0 0 10px color-mix(in oklab, var(--accent) 25%, transparent);
    }
    .language-control[data-role="top"] {
      flex-shrink: 0;
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
    .language-control.language-control--modal {
      min-width: 112px;
      width: auto;
      padding: 0;
      flex: 0 0 auto;
    }
    .language-trigger {
      width: 100%;
      height: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      font-family: 'Noto Sans TC', sans-serif;
      padding: 0 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
    }
    .language-control.open {
      border-color: rgba(255,255,255,.25);
      box-shadow: 0 0 10px color-mix(in oklab, var(--accent) 35%, transparent);
    }
    .language-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      width: 100%;
      min-width: 100%;
      padding: 6px 8px;
      border-radius:14px;
      background: var(--lang-menu-bg);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 12px 30px rgba(0,0,0,.45);
      display: flex;
      flex-direction: column;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      transform: none;
      transition: opacity .2s ease;
      z-index: 60;
    }
    .language-control.open .language-menu {
      opacity: 1;
      pointer-events: auto;
      transform: none;
    }
    .language-option {
      border: none;
      background: transparent;
      border-radius: 12px;
      padding:9px 14px;
      text-align: center;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s ease, color .2s ease;
    }
    .language-option:hover { background: rgba(255,255,255,.08); }
    .language-option.active {
      background: rgba(147,58,253,.2);
      color: var(--text);
    }

    .sidebar {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: var(--dock-rail-width);
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: var(--dock-rail-width);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }

    #reportBtnContainer {
      position: fixed;
      right: 16px;
      bottom: 24px;
      width: var(--dock-rail-width);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 30;
    }

    #toTop { 
      position: relative;
      width: var(--dock-btn-size);
      height: var(--dock-btn-size);
      right: auto; 
      bottom: auto;
      opacity: 0;
      visibility: hidden;
      transform: none;
      transition: none;
      z-index: 1;
    }
    #toTop.visible {
      opacity: 1;
      visibility: visible;
      transform: none;
    }

    #toTop.fab:hover {
      transform: none;
    }

    .dock-btn {
      width: var(--dock-btn-size);
      height: var(--dock-btn-size);
      border-radius: 50%;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease, color .15s ease;
      font-size: 28px;
      flex-shrink: 0;
      text-decoration: none;
    }
    .dock-btn:hover { color: var(--text); background: var(--overlay-light-hover); }
    .dock-btn.active, .dock-btn.has-filters { background: rgba(147,58,253,.15); color: var(--accent); }
    .dock-btn .material-icons { font-size: 34px; line-height: 1; }
    .dock-btn img { width: 65%; height: 65%; object-fit: contain; filter: drop-shadow(0 1px 1px rgba(0,0,0,.35)); opacity: 0.8; }
    .dock-btn.active img { opacity: 1; }
    .dock-divider {
      width: calc(var(--dock-btn-size) - 20px);
      height: 1px;
      background: rgba(255,255,255,.08);
      margin: 4px 0;
      flex-shrink: 0;
    }
    
    .filter-panel {
      position: fixed;
      right: clamp(100px, 5vw, 140px);
      top: 60%;
      transform: translateY(-50%) translateX(20px);
      opacity: 0;
      pointer-events: none;
      width: clamp(300px, 40vw, 400px);
      max-height: 60vh;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 14px;
      z-index: 121;
      box-shadow: 0 10px 28px rgba(0,0,0,.34);
      transition: opacity .2s ease, transform .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .filter-title { font-size: 14px; color: var(--text); font-weight: 700; }
    .clear-filters-btn {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      transition: all .2s;
    }
    .clear-filters-btn:hover { background: rgba(255,255,255,.1); color: var(--text); }
    
    .container { 
      padding: 26px 102px 120px 20px;
      transition: padding-right .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .filter-backdrop {
      position: fixed;
      inset: 0;
      z-index: 120;
      opacity: 0;
      pointer-events: none;
      background: transparent;
    }

    body.filter-open .filter-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) translateX(0);
    }

    body.filter-open .filter-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
    
    .filter-tags {
      flex: 1;
      height: 100%;
      width: 100%;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      align-content: flex-start;
      justify-content: flex-end;
      gap: 8px 10px;
      padding: 0 6px 0 10px;
      margin-left: auto;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .filter-tags::-webkit-scrollbar {
      width: 4px;
    }
    .filter-tags::-webkit-scrollbar-track {
      background: transparent;
    }
    .filter-tags::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,.15);
      border-radius: 999px;
    }
    .filter-tag {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      background: rgba(255,255,255,.03);
      transition: all .2s;
      user-select: none;
      white-space: nowrap;
      direction: ltr;
    }
    .filter-tag.active {
      color: var(--t-color, #fff);
      background: color-mix(in srgb, var(--t-color) 15%, transparent);
      border-color: color-mix(in srgb, var(--t-color) 50%, transparent);
    }
    .filter-tag:hover:not(.active) {
      background: rgba(255,255,255,.08);
    }

    .official-panel {
      margin: 0 auto 32px;
      width: 100%;
      max-width: var(--content-max);
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }
    .official-header {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 20px;
    }
    .official-group {
      display: flex;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .official-group.hide-border {
      border-bottom: none !important;
      margin-bottom: 0 !important;
      padding-bottom: 0 !important;
    }
    .official-group:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .official-group-logo {
      width: 40px;
      height: 40px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .official-group-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
    }
    .official-group-content {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 40px;
      gap: 12px 16px;
      overflow: visible;
    }
    /* 當 group 尚未展開時，最多只顯示前面的項目，多餘的隱藏 */
    .official-group:not(.expanded) .official-group-content .official-item.hide-when-collapsed {
      display: none !important;
    }
    .official-item {
      height: 40px;
      background: rgba(100,100,130,.25);
      border: none;
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: border-color .2s, box-shadow .2s, color .2s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .official-item:hover {
      transform: none;
      outline: 1px solid rgba(132, 0, 255, 0.6);
      box-shadow: 0 0px 12px rgba(132, 0, 255,.3), 0 0 10px color-mix(in oklab, var(--accent) 25%, transparent);
      color: var(--text);
    }
    .official-expand-container {
      display: flex;
      flex-direction: column;
      margin-left: 16px;
      flex-shrink: 0;
    }
    /* 在第一行推一個與 expand 高度相同的空白 */
    .official-expand-spacer {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .official-expand {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      background: var(--overlay-light-hover);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .official-expand:hover { background: var(--overlay-light-active); color: var(--text); }
    .official-expand .material-icons { font-size: 20px; transition: transform 0.3s; }
    .official-group.expanded .official-expand .material-icons { transform: rotate(180deg); }
    .official-group.expanded .official-expand { color: var(--accent); background: rgba(147,58,253,.15); }
    
    @media (max-width: 1200px) {
      :root { --content-max: calc(var(--card-width) * 2 + var(--grid-gap)); }
      .official-group-content { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .top-zone-inner { flex-wrap: wrap; }
      .language-control[data-role="top"] { display: none; }
    }
    @media (max-width: 800px) {
      :root { --content-max: var(--card-width); }
      .official-panel { padding: 20px; }
      .official-group-content { grid-template-columns: minmax(0, 1fr); }
      
      /* 單欄模式下縮小置頂區的 logo 與展開按鈕 */
      .official-group-logo {
        width: 32px;
        height: 32px;
        margin-right: 12px;
      }
      .official-expand-spacer {
        width: 32px;
        /* 在單欄下，上方墊高 40px 的 .official-item 高度再加上 17px 的 gap */
        height: 57px; 
        margin-bottom: 0; 
      }
      .official-expand {
        width: 32px;
        height: 32px;
      }
      .official-expand-container {
        margin-left: 12px;
        justify-content: flex-start;
      }
    }

    .cards {
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, var(--card-width)));
      justify-content: center;
      gap: var(--grid-gap);
      width: 100%;
      max-width: var(--content-max);
    }
    @media (max-width: 1200px) {
      .cards { grid-template-columns: repeat(2, minmax(0, var(--card-width))); }
    }
    @media (max-width: 800px) {
      .cards { grid-template-columns: minmax(0, var(--card-width)); }
      .container { padding-right: 102px; padding-left: 20px; }
      .filter-panel { right: 100px; }
    }

    @media (max-width: 600px) {
      :root {
        --content-max: 100%;
        --dock-btn-size: clamp(40px, 11.5vw, 58px);
        --logo-safe: clamp(48px, 10vw, 56px);
        --dock-gap: clamp(4px, 2vw, 10px);
        --fab-size: var(--dock-btn-size);
      }
      .language-control[data-role="top"] { display: none; }
      .main-logo {
        left: 16px;
        top: 16px;
        width: 48px;
        height: 48px;
        z-index: 90;
      }

      .top-zone {
        padding: 16px 8px 18px;
        overflow: hidden;
      }

      .top-zone-inner {
        max-width: none;
        width: 100%;
        padding: 0 8px;
        margin: 0;
        box-sizing: border-box;
      }

      .search-wrap {
        width: 100%;
        justify-content: flex-end;
        align-items: center;
        padding: 0 0 0 calc(var(--logo-safe) / 2);
      }

      .search-pill {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        padding: 0;
        justify-content: center;
        cursor: pointer;
        background: var(--panel-2);
        max-width: none;
      }

      .search-pill:not(.expanded) #searchInput,
      .search-pill:not(.expanded) .search-meta,
      .search-pill:not(.expanded) #clearBtn {
        display: none !important;
      }

      .search-icon {
        display: block;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        transition: opacity 0.2s, transform 0.3s;
      }

      .search-pill.expanded {
        width: clamp(240px, calc(100% - var(--logo-safe) - 12px), 100%);
        height: 48px;
        border-radius: 999px;
        padding: 0 48px 0 44px;
        max-width: none;
      }

      .search-pill.expanded .search-icon {
        left: 16px;
        transform: none;
      }

      .search-pill.expanded #searchInput {
        display: block !important;
        opacity: 1;
        pointer-events: auto;
      }

      .search-pill.expanded .search-meta {
        display: flex !important;
        position: absolute;
        right: 44px;
      }

      .sidebar {
        left: 16px;
        right: 16px;
        bottom: calc(16px + var(--safe-bottom));
        top: auto;
        transform: none;

  <script src="config.js"></script>
  <script>
    const searchWrap = document.getElementById('searchWrap');
    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const countEl = document.getElementById('searchCount');
    const cardsContainer = document.getElementById('cards');
    const siteTitle = document.getElementById('siteTitle');
    const searchPill = document.getElementById('searchPill');
    const languageControls = [...document.querySelectorAll('.language-control')];
    const languageTriggers = [...document.querySelectorAll('.language-trigger')];
    const languageOptions = [...document.querySelectorAll('.language-option')];
    const supportToggle = document.getElementById('supportToggle');
    const supportSheet = document.getElementById('supportSheet');
    const supportPanel = document.getElementById('supportPanel');
    const supportHandle = document.getElementById('supportHandle');
    const APP_VERSION = 'v1.1.1';
    const appVersionEl = document.getElementById('appVersion');
    if (appVersionEl) appVersionEl.textContent = APP_VERSION;
    const LANGUAGE_STORAGE_KEY = 'toolkit:lang';
    const LANGUAGE_LABELS = {
      'ja': '日本語',
      'zh-Hant': '繁體中文',
      'en': 'English'
    };
    let supportDragging = false;
    let supportDragStartY = 0;
    let supportDragDelta = 0;

    function resetSupportPanelTransform() {
      if (supportPanel) {
        supportPanel.style.transition = '';
        supportPanel.style.transform = '';
      }
      if (supportSheet) supportSheet.style.opacity = '';
      supportDragging = false;
      supportDragDelta = 0;
      supportSheet?.classList.remove('dragging');
    }

    function toggleSupportSheet(forceState) {
      if (!supportSheet) return;
      const isOpen = supportSheet.classList.contains('open');
      const shouldOpen = typeof forceState === 'boolean' ? forceState : !isOpen;
      supportSheet.classList.toggle('open', shouldOpen);
      document.body.classList.toggle('sheet-open', shouldOpen);
      supportSheet.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
      if (!shouldOpen) {
        resetSupportPanelTransform();
      }
    }

    function handleSupportPointerDown(event) {
      if (!supportSheet || !supportPanel) return;
      supportDragging = true;
      supportDragStartY = event.clientY;
      supportPanel.style.transition = 'none';
      supportSheet.classList.add('dragging');
      window.addEventListener('pointermove', handleSupportPointerMove);
      window.addEventListener('pointerup', handleSupportPointerUp);
      window.addEventListener('pointercancel', handleSupportPointerUp);
    }

    function handleSupportPointerMove(event) {
      if (!supportDragging || !supportPanel || !supportSheet) return;
      const currentY = event.clientY;
      supportDragDelta = Math.max(0, currentY - supportDragStartY);
      const translateY = Math.min(supportDragDelta, 200);
      supportPanel.style.transform = `translateY(${translateY}px)`;
      const opacityFactor = Math.max(0, Math.min(1, 1 - translateY / 260));
      supportSheet.style.opacity = opacityFactor;
    }

    function handleSupportPointerUp() {
      if (!supportDragging || !supportPanel || !supportSheet) return;
      const shouldClose = supportDragDelta > 80;
      supportPanel.style.transition = '';
      supportSheet.style.opacity = '';
      if (shouldClose) {
        toggleSupportSheet(false);
      } else {
        supportPanel.style.transform = '';
      }
      supportDragging = false;
      supportDragDelta = 0;
      supportSheet.classList.remove('dragging');
      window.removeEventListener('pointermove', handleSupportPointerMove);
      window.removeEventListener('pointerup', handleSupportPointerUp);
      window.removeEventListener('pointercancel', handleSupportPointerUp);
    }

    // 動態生成顏色
    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 75%, 65%)`;
    }

    function closeLanguageMenus() {
      languageControls.forEach(control => {
        control.classList.remove('open');
        const trigger = control.querySelector('.language-trigger');
        if (trigger) trigger.setAttribute('aria-expanded', 'false');
      });
    }

    function updateLanguageUI(value) {
      const label = LANGUAGE_LABELS[value] || value;
      languageTriggers.forEach(trigger => {
        trigger.textContent = label;
      });
      languageOptions.forEach(option => {
        option.classList.toggle('active', option.dataset.lang === value);
      });
    }

    function setLanguagePreference(value) {
      document.documentElement.lang = value;
      updateLanguageUI(value);
      try {
        localStorage.setItem(LANGUAGE_STORAGE_KEY, value);
      } catch (err) {
        /* ignore private mode */
      }
    }

    (function initLanguagePreference() {
      if (!languageTriggers.length) return;
      let initial = 'zh-Hant';
      try {
        initial = localStorage.getItem(LANGUAGE_STORAGE_KEY) || document.documentElement.lang || 'zh-Hant';
      } catch (err) {
        initial = document.documentElement.lang || 'zh-Hant';
      }
      setLanguagePreference(initial);

      languageTriggers.forEach(trigger => {
        trigger.addEventListener('click', (event) => {
          event.stopPropagation();
          const control = trigger.closest('.language-control');
          if (!control) return;
          const willOpen = !control.classList.contains('open');
          closeLanguageMenus();
          if (willOpen) {
            control.classList.add('open');
            trigger.setAttribute('aria-expanded', 'true');
          }
        });
      });

      languageOptions.forEach(option => {
        option.addEventListener('click', (event) => {
          const value = option.dataset.lang;
          if (value) setLanguagePreference(value);
          closeLanguageMenus();
        });
      });
    })();

    (function initAppearancePreference() {
      const appearanceButtons = [...document.querySelectorAll('.appearance-container .appearance-btn')];
      if (!appearanceButtons.length) return;
      
      const APPEARANCE_STORAGE_KEY = 'app_appearance_theme';
      let currentTheme = 'dark';
      
      try {
        currentTheme = localStorage.getItem(APPEARANCE_STORAGE_KEY) || 'dark';
      } catch (err) {
        currentTheme = 'dark';
      }
      
      function setAppearance(theme) {
        currentTheme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        appearanceButtons.forEach(btn => {
          const isActive = btn.dataset.theme === theme;
          btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
        });
        
        try {
          localStorage.setItem(APPEARANCE_STORAGE_KEY, theme);
        } catch (err) {
        }
      }
      
      setAppearance(currentTheme);
      
      appearanceButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const theme = btn.dataset.theme;
          setAppearance(theme);
        });
      });
    })();

    document.addEventListener('click', (event) => {
      if (!event.target.closest('.language-control')) {
        closeLanguageMenus();
      }
    });

    let allTagsSet = new Set(['公式']);
    let activeSite = 'all';
    let matches = [];
    let currentIndex = 0;
    let officialMatchesCount = 0;

    function safeHref(rawHref) {
      if (!rawHref) return null;
      try {
        const url = new URL(String(rawHref).trim(), window.location.href);
        if (url.protocol === 'http:' || url.protocol === 'https:' || url.protocol === 'mailto:') return url.href;
      } catch {
        return null;
      }
      return null;
    }

    function renderTextWithLinks(containerEl, text) {
      if (!containerEl) return;
      containerEl.textContent = '';

      const str = String(text ?? '');
      const lines = str.split('\n');
      const linkRe = /\[([^\]]+?)\]\(([^\s)]+)\)/g;

      lines.forEach((line, lineIndex) => {
        let lastIndex = 0;
        let match;

        while ((match = linkRe.exec(line)) !== null) {
          const [full, label, hrefCandidate] = match;
          const start = match.index;
          const end = start + full.length;

          if (start > lastIndex) {
            containerEl.appendChild(document.createTextNode(line.slice(lastIndex, start)));
          }

          const href = safeHref(hrefCandidate);
          if (href) {
            const a = document.createElement('a');
            a.textContent = label;
            a.href = href;
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
            containerEl.appendChild(a);
          } else {
            containerEl.appendChild(document.createTextNode(full));
          }

          lastIndex = end;
        }

        if (lastIndex < line.length) {
          containerEl.appendChild(document.createTextNode(line.slice(lastIndex)));
        }

        if (lineIndex < lines.length - 1) {
          containerEl.appendChild(document.createElement('br'));
        }
      });
    }
    
    // 初始化卡片
    function initCards() {
      cardsContainer.innerHTML = '';
      toolConfig.forEach(tool => {
        tool.tags.forEach(t => allTagsSet.add(t));
        
        const dotsHtml = tool.groups.map(g => `<span class="dot ${g}"></span>`).join('');
        const tagsHtml = tool.tags.filter(t => t !== '公式').map(t => {
          const color = stringToColor(t);
          const label = (typeof tagLabels !== 'undefined' && tagLabels[t]) ? tagLabels[t] : t;
          return `<span class="card-tag" style="color: ${color}; background: color-mix(in srgb, ${color} 15%, transparent); border: 1px solid color-mix(in srgb, ${color} 30%, transparent);">${label}</span>`;
        }).join('');

        const el = document.createElement('div');
        el.className = 'tool-card';
        el.dataset.site = tool.groups.join(' ');
        el.dataset.tags = tool.tags.join(' ');
        el.dataset.href = tool.link;

        el.innerHTML = `
          <div class="tool-header">
            <div class="tool-info">
              <div class="name">${tool.name}</div>
              <div class="desc">${tool.desc}</div>
            </div>
            <div class="dots">${dotsHtml}</div>
          </div>
          <div class="expand"><span class="material-icons">expand_more</span></div>
          <div class="tool-detail">
            <div class="tool-detail-text"></div>
            <div class="card-tags">${tagsHtml}</div>
          </div>
        `;

        const detailEl = el.querySelector('.tool-detail-text');
        renderTextWithLinks(detailEl, tool.detail);
        cardsContainer.appendChild(el);
      });
    }

    // 初始化篩選器
    function initFilters() {
      const filterTagsContainer = document.getElementById('filterTags');
      if (!filterTagsContainer) return;
      filterTagsContainer.innerHTML = '';
      
      allTagsSet.forEach(t => {
        const color = stringToColor(t);
        const label = (typeof tagLabels !== 'undefined' && tagLabels[t]) ? tagLabels[t] : t;
        const btn = document.createElement('div');
        btn.className = 'filter-tag'; // 預設不常亮
        btn.dataset.value = t;
        btn.textContent = label;
        btn.style.setProperty('--t-color', color);
        
        btn.addEventListener('click', () => {
          btn.classList.toggle('active');
          applyFilters();
        });
        
        filterTagsContainer.appendChild(btn);
      });
    }

    function renderOfficial() {
      const panel = document.getElementById('officialPanel');
      const container = document.getElementById('officialGroups');
      if (!panel || !container) return;
      const oData = typeof officialConfig !== 'undefined' ? officialConfig : [];
      
      if (!oData.length) {
        panel.style.display = 'none';
        return;
      }
      
      container.innerHTML = '';
      
      const groupsToOrder = [
        { id: 'nogi', logo: 'https://www.nogizaka46.com/files/46/page/31thSG_ul_xF2c/images/logo.svg' },
        { id: 'saku', logo: 'https://sakurazaka46.com/files/14/s46/img/com-logo-no-framed.svg' },
        { id: 'hina', logo: 'https://cdn.hinatazaka46.com/files/14/hinata/pages/4th_anniv/images/logo_hinata.svg' }
      ];
      
      groupsToOrder.forEach(g => {
        const items = oData.filter(i => i.group === g.id);
        if (!items.length) return;
        
        // 這裡隱性標記它們都含有公式類別，以防之後要用到
        
        const groupEl = document.createElement('div');
        groupEl.className = 'official-group';
        groupEl.dataset.group = g.id;
        
        // 建立左側團體 Logo 區塊
        const logoEl = document.createElement('div');
        logoEl.className = 'official-group-logo';
        logoEl.innerHTML = `<img src="${g.logo}" alt="${g.id}">`;
        
        const contentEl = document.createElement('div');
        contentEl.className = 'official-group-content';
        
        items.forEach(item => {
          const a = document.createElement('a');
          a.className = 'official-item';
          a.href = item.link;
          a.target = '_blank';
          a.textContent = item.name;
          a.dataset.name = item.name;
          contentEl.appendChild(a);
        });
        
        // 建立右邊展開按鈕的區塊（上方放一個空位，佔據第一行的空間，把按鈕推到第二行）
        const expandContainer = document.createElement('div');
        expandContainer.className = 'official-expand-container';
        
        const expandSpacer = document.createElement('div');
        expandSpacer.className = 'official-expand-spacer';
        
        const expandBtn = document.createElement('div');
        expandBtn.className = 'official-expand';
        expandBtn.innerHTML = '<span class="material-icons">expand_more</span>';
        expandBtn.addEventListener('click', () => {
          groupEl.classList.toggle('expanded');
          updateOfficialVisibility();
        });
        
        expandContainer.appendChild(expandSpacer);
        expandContainer.appendChild(expandBtn);
        
        groupEl.appendChild(logoEl);
        groupEl.appendChild(contentEl);
        groupEl.appendChild(expandContainer);
        container.appendChild(groupEl);
      });
      
      updateOfficialVisibility();
    }

    function updateOfficialVisibility() {
      const panel = document.getElementById('officialPanel');
      if (!panel) return;
      let panelVisible = false;
      const q = input.value.trim().toLowerCase();
      officialMatchesCount = 0;
      
      const cols = window.innerWidth > 1200 ? 3 : (window.innerWidth > 800 ? 2 : 1);
      const maxItems = cols * 2;

      let visibleGroups = [];

      // 檢查是否應該隱藏（標籤過濾但未包含 '公式'）
      const selected = selectedTags();
      const hideBecauseTag = selected.length > 0 && !selected.includes('公式');

      if (hideBecauseTag) {
        panel.style.display = 'none';
        officialMatchesCount = 0;
        return;
      }

      document.querySelectorAll('.official-group').forEach(groupEl => {
        const groupId = groupEl.dataset.group;
        const matchFilter = activeSite === 'all' || activeSite === groupId;
        
        let visibleCount = 0;
        const items = groupEl.querySelectorAll('.official-item');
        
        let totalMatchCount = 0;
        items.forEach(a => {
          const name = (a.dataset.name || '').toLowerCase();
          const href = (a.href || '').toLowerCase();
          const matchSearch = !q || name.includes(q) || href.includes(q);
          const isMatch = matchFilter && matchSearch;
          
          if (isMatch) {
             totalMatchCount++;
             a.style.display = 'flex';
             if (q) {
               a.style.borderColor = 'color-mix(in oklab, var(--accent) 75%, white 25%)';
               a.style.boxShadow = '0 0 0 3px rgba(147,58,253,.25)';
             } else {
               a.style.borderColor = '';
               a.style.boxShadow = '';
             }
             
             visibleCount++;
             if (!groupEl.classList.contains('expanded') && visibleCount > maxItems) {
               a.classList.add('hide-when-collapsed');
             } else {
               a.classList.remove('hide-when-collapsed');
             }
          } else {
             a.style.display = 'none';
             a.classList.remove('hide-when-collapsed');
          }
        });
        
        const expandContainer = groupEl.querySelector('.official-expand-container');
        
        if (totalMatchCount > maxItems) {
          expandContainer.style.display = 'flex';
        } else {
          expandContainer.style.display = 'none';
          groupEl.classList.remove('expanded');
        }

        officialMatchesCount += totalMatchCount;
        
        if (totalMatchCount > 0) {
          groupEl.style.display = 'flex';
          groupEl.classList.remove('hide-border');
          visibleGroups.push(groupEl);
          panelVisible = true;
        } else {
          groupEl.style.display = 'none';
        }
      });
      
      // 最後一個可見的 group 隱藏底線
      if (visibleGroups.length > 0) {
        visibleGroups[visibleGroups.length - 1].classList.add('hide-border');
      }
      
      const oDataExists = typeof officialConfig !== 'undefined' && officialConfig.length > 0;
      if (!oDataExists) panelVisible = false;
      
      const realPanel = document.getElementById('officialPanel');
      if (realPanel) {
        realPanel.style.display = panelVisible ? 'block' : 'none';
      }
    }

    initCards();
    initFilters();
    renderOfficial();
    window.addEventListener('resize', () => {
      updateOfficialVisibility();
      updateSiteTitleVisibility();
    });

    const cards = [...document.querySelectorAll('.tool-card')];

    // 卡片點擊邏輯
    document.addEventListener('click', (e) => {
      const card = e.target.closest('.tool-card');
      if (!card) return;

      const expandBtn = e.target.closest('.expand');
      const toolDetail = e.target.closest('.tool-detail');
      const toolHeader = e.target.closest('.tool-header');
      
      if (expandBtn) {
        // 點擊展開按鈕：切換展開狀態
        card.classList.toggle('expanded');
        const icon = expandBtn.querySelector('.material-icons');
        icon.textContent = card.classList.contains('expanded') ? 'expand_less' : 'expand_more';
      } else if (toolDetail) {
        // 點擊展開的詳細內容：不要連去網頁，也不要收合（讓使用者可以複製文字）
        return;
      } else if (toolHeader) {
        // 點擊卡片頭部：打開連結
        const href = card.dataset.href;
        if (href) window.open(href, '_blank');
      }
    });

    const dockBtns = [...document.querySelectorAll('.sidebar .dock-btn[data-site]')];
    const filterToggle = document.getElementById('filterToggle');
    const filterPanel = document.getElementById('filterPanel');

    function selectedTags() {
      return [...document.querySelectorAll('.filter-tag.active')].map(c => c.dataset.value);
    }

    function updateSiteTitleVisibility() {
      if (!siteTitle) return;
      const width = window.innerWidth;
      const searchExpanded = searchPill?.classList.contains('expanded');
      const showDesktop = width > 1200;
      const showCollapsedMobile = width <= 600 && !searchExpanded;
      const shouldShow = showDesktop || showCollapsedMobile;
      siteTitle.classList.toggle('hidden', !shouldShow);
      if (showCollapsedMobile) {
        siteTitle.classList.add('mobile-visible');
      } else {
        siteTitle.classList.remove('mobile-visible');
      }
    }

    function cardVisible(card) {
      const sites = (card.dataset.site || 'other').split(/\s+/).filter(Boolean);
      const tags = (card.dataset.tags || '').split(/\s+/).filter(Boolean);
      const bySite = activeSite === 'all' ? true : sites.includes(activeSite);
      const selected = selectedTags();
      const byTag = selected.length ? tags.some(t => selected.includes(t)) : true;
      return bySite && byTag;
    }

    function applyFilters() {
      // 根據選中的標籤數決定 filterToggle 是否高亮
      if (selectedTags().length > 0) {
        filterToggle.classList.add('has-filters');
      } else {
        filterToggle.classList.remove('has-filters');
      }

      runSearch(false);
    }

    function clearHighlights() {
      cards.forEach(c => c.classList.remove('match', 'current'));
    }

    function updateCount() {
      const q = input.value.trim();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (!q) {
        countEl.style.display = 'none';
      } else {
        countEl.style.display = 'block';
        const total = (matches?.length || 0) + (officialMatchesCount || 0);
        countEl.textContent = `${total}件`;
      }
    }

    function runSearch(advance = false) {
      clearHighlights();
      const q = input.value.trim().toLowerCase();
      let hasVisibleCard = false;

      updateOfficialVisibility();
      let hasOfficial = false;
      const officialPanel = document.getElementById('officialPanel');
      if (officialPanel && window.getComputedStyle(officialPanel).display !== 'none') {
        hasOfficial = true;
      }

      const selected = selectedTags();
      
      if (!q) {
        matches = [];
        currentIndex = 0;
        cards.forEach(card => {
          const isVisible = cardVisible(card);
          card.style.display = isVisible ? 'block' : 'none';
          if (isVisible) hasVisibleCard = true;
        });
        updateCount();
        document.getElementById('noResultsMsg').style.display = (hasVisibleCard || hasOfficial) ? 'none' : 'block';
        return;
      }

      const visibleCards = cards.filter(c => cardVisible(c));
      
      matches = visibleCards.filter(card => {
        const nameText = card.querySelector('.name')?.textContent || '';
        const descText = card.querySelector('.desc')?.textContent || '';
        const detailText = card.querySelector('.tool-detail-text')?.textContent || '';
        const tagTokens = card.dataset.tags || '';
        const tagLabelsText = card.querySelector('.card-tags')?.textContent || '';
        const hrefText = card.dataset.href || '';
        const text = `${nameText} ${descText} ${detailText} ${tagTokens} ${tagLabelsText} ${hrefText}`.toLowerCase();
        return text.includes(q);
      });

      cards.forEach(card => {
        if (matches.includes(card)) {
          // 若同時在官網區塊中有結果被搜尋到時，下方的網頁卡片搜尋結果可考慮不顯示（依照要求：搜尋結果排除置頂結果，因此我們在這裡隱藏重複出現的）
          // 但是我們這裡其實很難精準對應置頂的內容，通常所謂的置頂卡片指的是：如果他在上面找到了，下面就不要顯示相同的東西。
          // 我們這裡先只負責依您的要求：將一般卡片獨立顯示即可。若他有 公式 標籤且面板已經因為搜尋而有結果，下方就不顯示。
          
          let skipBecauseOfOfficial = false;
          if (hasOfficial) {
             const isMatchThisOfficialItem = Array.from(document.querySelectorAll('.official-item')).some(oi => {
               return oi.style.display !== 'none' && oi.dataset.name.toLowerCase() === card.querySelector('.name').textContent.toLowerCase();
             });
             // 若上方有了，下方這個就藏起來
             if (isMatchThisOfficialItem) {
               skipBecauseOfOfficial = true;
             }
          }
          
          if (!skipBecauseOfOfficial) {
            card.style.display = 'block';
            card.classList.add('match');
            hasVisibleCard = true;
          } else {
            card.style.display = 'none';
          }
        } else {
          card.style.display = 'none';
        }
      });
      
      // 更新有效 matches
      matches = matches.filter(card => card.style.display === 'block');

      if (!matches.length) {
        currentIndex = 0;
        updateCount();
        document.getElementById('noResultsMsg').style.display = hasOfficial ? 'none' : 'block';
        return;
      }

      document.getElementById('noResultsMsg').style.display = 'none';

      if (advance) currentIndex = (currentIndex + 1) % matches.length;
      else if (currentIndex >= matches.length) currentIndex = 0;
      if (matches[currentIndex]) {
        const current = matches[currentIndex];
        current.classList.add('current');
        current.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      updateCount();
    }

    input.addEventListener('focus', () => searchWrap.classList.add('focused'));
    input.addEventListener('blur', () => {
      if (!input.value.trim()) searchWrap.classList.remove('focused');
    });

    input.addEventListener('input', () => {
      currentIndex = 0;
      runSearch(false);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSearch(true);
      }
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      searchWrap.classList.remove('focused');
      runSearch(false);
      input.focus();
    });

    dockBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        dockBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSite = btn.dataset.site || 'all';
        applyFilters();
      });
    });

    const toTopBtn = document.getElementById('toTop');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 150) {
        toTopBtn.classList.add('visible');
      } else {
        toTopBtn.classList.remove('visible');
      }
    });

    searchPill.addEventListener('click', (e) => {
      if (window.innerWidth <= 600 && !searchPill.classList.contains('expanded')) {
        searchPill.classList.add('expanded');
        setTimeout(() => input.focus(), 100);
      }
      updateSiteTitleVisibility();
    });

    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 600) {
        if (!searchPill.contains(e.target) && input.value.trim() === '') {
          searchPill.classList.remove('expanded');
          updateSiteTitleVisibility();
        }
      }
    });

    filterToggle.addEventListener('click', () => {
      document.body.classList.toggle('filter-open');
      filterToggle.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
      if (!filterPanel.contains(e.target) && e.target !== filterToggle && !filterToggle.contains(e.target)) {
        document.body.classList.remove('filter-open');
        filterToggle.classList.remove('active');
      }
    });

    document.getElementById('clearFiltersBtn').addEventListener('click', () => {
      document.querySelectorAll('.filter-tag.active').forEach(tag => tag.classList.remove('active'));
      applyFilters();
    });

    const infoModalDrop = document.getElementById('infoModalDrop');
    const closeInfoBtn = document.getElementById('closeInfoBtn');

    document.getElementById('mainLogo').addEventListener('click', () => {
      infoModalDrop.classList.add('open');
    });

    closeInfoBtn.addEventListener('click', () => {
      infoModalDrop.classList.remove('open');
    });
    
    infoModalDrop.addEventListener('click', (e) => {
      if (e.target === infoModalDrop) {
        infoModalDrop.classList.remove('open');
      }
    });

    toTopBtn.addEventListener('click', (e) => {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    if (supportToggle && supportSheet) {
      supportToggle.addEventListener('click', () => toggleSupportSheet(true));
    }

    if (supportHandle) {
      supportHandle.addEventListener('pointerdown', handleSupportPointerDown);
    }

    if (supportSheet) {
      supportSheet.addEventListener('click', (event) => {
        if (event.target === supportSheet) toggleSupportSheet(false);
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && supportSheet.classList.contains('open')) {
          toggleSupportSheet(false);
        }
      });
    }

    if (typeof paypal !== 'undefined' && document.getElementById('paypal-container-2PE77EL5SYHCS')) {
      paypal.HostedButtons({
        hostedButtonId: '2PE77EL5SYHCS',
      }).render('#paypal-container-2PE77EL5SYHCS');
    }

    updateSiteTitleVisibility();
    applyFilters();
  </script>
</body>
</html>
