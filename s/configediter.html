<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>坂道專案後台編輯器</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; max-width: 900px; margin: auto; }
        .section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; position: relative; background: #fafafa; }
        .card:hover { border-color: #666; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        input, select, textarea { padding: 8px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; }
        input[type="text"], textarea { width: 95%; }
        button { cursor: pointer; padding: 8px 15px; border: none; border-radius: 4px; background: #007bff; color: white; }
        button:hover { background: #0056b3; }
        button.delete { background: #dc3545; }
        button.move { background: #6c757d; padding: 4px 8px; font-size: 12px; }
        .tag-group { display: flex; flex-wrap: wrap; gap: 5px; }
        .status { font-weight: bold; color: green; }
    </style>
</head>
<body>

    <h2>坂道專案後台編輯器</h2>

    <div class="section">
        <div class="controls">
            <label>1. 輸入 Token:</label>
            <input type="password" id="token" placeholder="github_pat_...">
            <label>2. 選擇檔案:</label>
            <select id="fileName">
                <option value="config.js">config.js (日語/預設)</option>
                <option value="config_en.js">config_en.js (英語)</option>
                <option value="config_zh-Hans.js">config_zh-Hans.js (簡體)</option>
                <option value="config_zh-Hant.js">config_zh-Hant.js (繁體)</option>
            </select>
            <button onclick="fetchFile()">讀取內容</button>
        </div>
        <p id="loadStatus"></p>
    </div>

    <div id="editorArea" style="display:none;">
        <div class="section">
            <h3>Official Config (官方網站) <button onclick="addItem('official')">+ 新增</button></h3>
            <div id="officialList"></div>
        </div>

        <div class="section">
            <h3>Tool Config (相關工具) <button onclick="addItem('tool')">+ 新增</button></h3>
            <div id="toolList"></div>
        </div>

        <div class="section" style="text-align: center;">
            <button style="font-size: 1.2em; background: #28a745;" onclick="saveToFile()">確認儲存並推送到 GitHub</button>
            <p id="saveStatus"></p>
        </div>
    </div>

    <script>
        const OWNER = 'Shijinzakaue'; // 改成你的 GitHub 帳號
        const REPO = 'shijinzakaue.github.io'; // 改成你的 Repository 名稱
        
        // 你的標籤定義 
        const tagLabels = {
            "item": "アイテム・愛用品", "clothes": "私服・衣装・制服", "place": "場所・聖地巡禮", "sns": "SNS",
            "blog": "ブログ", "meet": "握手・ミーグリ", "information": "個人・グループ情報", "song": "楽曲資料",
            "sale": "売上", "game": "ゲーム", "streaming": "ストリーミング・配信", "photo": "写真",
            "message": "メッセージ", "create": "作成ツール", "oshi": "推し活", "ranking": "ランキング",
            "forum": "まとめ・RSS", "live": "ライブ・セトリ", "tool": "関連ツール"
        };

        const groups = { "nogi": "乃木坂46", "saku": "櫻坂46", "hina": "日向坂46" };
        let currentSha = '';
        let dataStore = { officialConfig: [], toolConfig: [] };

        async function fetchFile() {
            const token = document.getElementById('token').value;
            const file = document.getElementById('fileName').value;
            if(!token) return alert("請先輸入 Token");

            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${file}`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
                const json = await res.json();
                currentSha = json.sha;
                const content = decodeURIComponent(escape(atob(json.content)));
                parseJS(content);
                renderUI();
                document.getElementById('editorArea').style.display = 'block';
                document.getElementById('loadStatus').innerText = "載入成功！";
            } catch (e) { alert("載入失敗，請檢查帳號、專案名或 Token"); }
        }

        // 解析 JS 內容 (粗暴但有效的解析)
        function parseJS(str) {
            try {
                const offMatch = str.match(/var officialConfig = (\[[\s\S]*?\]);/);
                const toolMatch = str.match(/var toolConfig = (\[[\s\S]*?\]);/);
                dataStore.officialConfig = offMatch ? eval(offMatch[1]) : [];
                dataStore.toolConfig = toolMatch ? eval(toolMatch[1]) : [];
            } catch (e) { alert("解析 JS 失敗，請確保檔案格式正確"); }
        }

        function renderUI() {
            const offList = document.getElementById('officialList');
            const toolList = document.getElementById('toolList');
            offList.innerHTML = ''; toolList.innerHTML = '';

            dataStore.officialConfig.forEach((item, i) => {
                offList.innerHTML += createCard('official', item, i);
            });
            dataStore.toolConfig.forEach((item, i) => {
                toolList.innerHTML += createCard('tool', item, i);
            });
        }

        function createCard(type, item, index) {
            if (type === 'official') {
                return `
                <div class="card">
                    <button class="move" onclick="moveItem('official', ${index}, -1)">↑</button>
                    <button class="move" onclick="moveItem('official', ${index}, 1)">↓</button>
                    <input type="text" value="${item.name}" onchange="updateValue('official', ${index}, 'name', this.value)" placeholder="名稱">
                    <input type="text" value="${item.link}" onchange="updateValue('official', ${index}, 'link', this.value)" placeholder="連結">
                    <select onchange="updateValue('official', ${index}, 'group', this.value)">
                        ${Object.entries(groups).map(([k,v]) => `<option value="${k}" ${item.group==k?'selected':''}>${v}</option>`).join('')}
                    </select>
                    <button class="delete" onclick="removeItem('official', ${index})">刪除</button>
                </div>`;
            } else {
                return `
                <div class="card">
                    <button class="move" onclick="moveItem('tool', ${index}, -1)">↑</button>
                    <button class="move" onclick="moveItem('tool', ${index}, 1)">↓</button>
                    <input type="text" value="${item.name}" onchange="updateValue('tool', ${index}, 'name', this.value)" placeholder="標題">
                    <input type="text" value="${item.desc}" onchange="updateValue('tool', ${index}, 'desc', this.value)" placeholder="副標題">
                    <input type="text" value="${item.link}" onchange="updateValue('tool', ${index}, 'link', this.value)" placeholder="連結 (選填)">
                    <textarea onchange="updateValue('tool', ${index}, 'detail', this.value)" placeholder="詳細內容">${item.detail || ''}</textarea>
                    <div>標籤 (多選): ${Object.entries(tagLabels).map(([k, v]) => `
                        <label><input type="checkbox" ${item.tags?.includes(k)?'checked':''} onclick="toggleTag(${index}, '${k}')">${v.split('・').pop()}</label>
                    `).join('')}</div>
                    <button class="delete" onclick="removeItem('tool', ${index})">刪除</button>
                </div>`;
            }
        }

        function updateValue(type, i, key, val) { dataStore[`${type}Config`][i][key] = val; }
        
        function toggleTag(i, tag) {
            let tags = dataStore.toolConfig[i].tags || [];
            if(tags.includes(tag)) tags = tags.filter(t => t !== tag);
            else tags.push(tag);
            dataStore.toolConfig[i].tags = tags;
        }

        function addItem(type) {
            if(type === 'official') dataStore.officialConfig.push({name:"", link:"", group:"nogi"});
            else dataStore.toolConfig.push({name:"", desc:"", link:"", detail:"", tags:[], groups:["nogi"]});
            renderUI();
        }

        function removeItem(type, i) { dataStore[`${type}Config`].splice(i, 1); renderUI(); }

        function moveItem(type, i, dir) {
            const arr = dataStore[`${type}Config`];
            const target = i + dir;
            if(target >= 0 && target < arr.length) {
                [arr[i], arr[target]] = [arr[target], arr[i]];
                renderUI();
            }
        }

        async function saveToFile() {
            const token = document.getElementById('token').value;
            const file = document.getElementById('fileName').value;
            const status = document.getElementById('saveStatus');
            status.innerText = "儲存中...";

            const newContent = `var lastUpdated = "${new Date().toISOString().slice(0,16).replace('T',' ')}";\n\nvar officialConfig = ${JSON.stringify(dataStore.officialConfig, null, 2)};\n\nvar toolConfig = ${JSON.stringify(dataStore.toolConfig, null, 2)};\n\nvar tagLabels = ${JSON.stringify(tagLabels, null, 2)};`;

            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${file}`;
            const res = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Update ${file} via Admin UI`,
                    content: btoa(unescape(encodeURIComponent(newContent))),
                    sha: currentSha
                })
            });

            if(res.ok) {
                const json = await res.json();
                currentSha = json.content.sha;
                status.innerText = "✅ 儲存成功！網頁約 1 分鐘後更新。";
            } else {
                status.innerText = "❌ 儲存失敗：" + (await res.json()).message;
            }
        }
    </script>
</body>
</html>
