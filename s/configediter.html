<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坂道 Config Editor</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: rgba(255,255,255,.08);
            --border-hover: rgba(255,255,255,.18);
            --text: #e8eaf6;
            --muted: #7b82a0;
            --accent: #933afd;
            --accent-dim: rgba(147,58,253,.15);
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #f59e0b;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans TC', sans-serif; min-height: 100vh; padding-bottom: 20px; }

        /* Header */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(15,17,23,.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex; align-items: center; gap: 12px;
        }
        .header h1 { font-size: 17px; font-weight: 700; letter-spacing: .5px; flex: 1; }
        .header h1 span { color: var(--accent); }

        /* Load Panel */
        .load-panel {
            margin: 16px; padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        .load-panel h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .load-row { display: flex; flex-direction: column; gap: 10px; }
        @media (min-width: 600px) { .load-row { flex-direction: row; flex-wrap: wrap; } }
        .field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
        .field label { font-size: 12px; color: var(--muted); font-weight: 500; }
        .field input, .field select {
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            padding: 10px 12px; font-size: 14px; outline: none;
            transition: border-color .2s;
            -webkit-appearance: none; appearance: none;
        }
        .field input:focus, .field select:focus { border-color: var(--accent); }
        .load-status { font-size: 13px; margin-top: 8px; min-height: 18px; color: var(--green); }
        .load-status.err { color: var(--red); }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px 18px; border: none; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600; cursor: pointer;
            transition: opacity .15s, transform .1s;
            white-space: nowrap;
        }
        .btn:active { transform: scale(.97); opacity: .85; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-success { background: var(--green); color: #000; }
        .btn-danger  { background: var(--red);   color: #fff; padding: 6px 10px; font-size: 12px; }
        .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; font-size: 12px; }
        .btn-add     { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(147,58,253,.3); font-size: 13px; padding: 7px 14px; }

        /* Section */
        .section {
            margin: 0 16px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .section-header {
            display: flex; align-items: center; gap: 8px;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer; user-select: none;
        }
        .section-header h2 { font-size: 14px; font-weight: 700; flex: 1; }
        .section-toggle {
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 18px; padding: 2px 4px;
            transition: transform .2s; display: flex; align-items: center;
            border-radius: 4px; flex-shrink: 0;
        }
        .section-toggle:hover { color: var(--text); }
        .section.collapsed .section-toggle { transform: rotate(-90deg); }
        .section.collapsed .section-body { display: none; }
        .section-header h2 .badge {
            display: inline-block; background: var(--accent-dim); color: var(--accent);
            font-size: 11px; padding: 2px 7px; border-radius: 99px; margin-left: 8px; font-weight: 600;
        }

        /* Card */
        .card {
            border-bottom: 1px solid var(--border);
            overflow: hidden;
        }
        .card:last-child { border-bottom: none; }
        .card-head {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; cursor: pointer;
            transition: background .15s;
            user-select: none;
        }
        .card-head:hover { background: rgba(255,255,255,.03); }
        .card-head:active { background: rgba(255,255,255,.05); }
        .card-title { flex: 1; min-width: 0; }
        .card-title .name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-title .sub  { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
        .card-head .chevron { color: var(--muted); font-size: 18px; transition: transform .2s; flex-shrink: 0; }
        .card.open .card-head .chevron { transform: rotate(180deg); }
        .card-body { display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); }
        .card.open .card-body { display: block; }
        .drag-handle {
            color: var(--muted); cursor: grab; user-select: none;
            padding: 4px 6px; font-size: 18px; line-height: 1; flex-shrink: 0;
            display: flex; align-items: center; border-radius: 4px;
            transition: color .15s, background .15s; letter-spacing: -1px;
            touch-action: none;
        }
        .drag-handle:hover { color: var(--text); background: var(--surface2); }
        .drag-handle:active { cursor: grabbing; }
        .card.dragging { opacity: .35; }
        .drop-indicator {
            height: 3px; background: var(--accent); border-radius: 2px;
            margin: 0; pointer-events: none; flex-shrink: 0;
        }

        /* Form inside card */
        .form-group { margin-top: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
        .form-group input[type="text"],
        .form-group textarea,
        .form-group select {
            width: 100%; background: var(--surface2);
            border: 1px solid var(--border); border-radius: var(--radius-sm);
            color: var(--text); padding: 9px 12px; font-size: 14px;
            outline: none; transition: border-color .2s; font-family: inherit;
            -webkit-appearance: none; appearance: none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: var(--accent);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* Checkboxes */
        .check-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
        .check-item {
            display: flex; align-items: center; gap: 5px;
            background: var(--surface2); border: 1px solid var(--border);
            border-radius: 6px; padding: 5px 9px; cursor: pointer;
            font-size: 12px; transition: background .15s, border-color .15s;
            user-select: none;
        }
        .check-item:has(input:checked) {
            background: var(--accent-dim); border-color: rgba(147,58,253,.4); color: #c4a8ff;
        }
        .check-item input { display: none; }

        /* Card actions */
        .card-actions { display: flex; gap: 8px; align-items: center; margin-top: 14px; flex-wrap: wrap; }

        /* Save bar - in header */
        .save-bar { display: contents; }
        .save-bar .btn-success { padding: 7px 14px; font-size: 13px; }
        #saveStatus { font-size: 12px; max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #saveStatus.ok  { color: var(--green); }
        #saveStatus.err { color: var(--red); }

        /* Move buttons - removed, replaced by drag handle */
    </style>
</head>
<body>

    <div class="header">
        <h1>坂道 <span>Config</span> Editor</h1>
        <div class="save-bar" id="saveBar" style="display:contents;visibility:hidden;">
            <button class="btn btn-success" onclick="saveToFile()">✓ 儲存並推送</button>
            <span id="saveStatus"></span>
        </div>
    </div>

    <!-- 載入設定 -->
    <div class="load-panel" id="loadPanel">
        <h2>連線設定</h2>
        <div class="load-row">
            <div class="field">
                <label>GitHub Token</label>
                <input type="password" id="token" placeholder="github_pat_...">
            </div>
            <div class="field">
                <label>檔案</label>
                <select id="fileName">
                    <option value="config.js">config.js（日語 / 預設）</option>
                    <option value="config_en.js">config_en.js（英語）</option>
                    <option value="config_zh-Hans.js">config_zh-Hans.js（簡體）</option>
                    <option value="config_zh-Hant.js">config_zh-Hant.js（繁體）</option>
                </select>
            </div>
            <div class="field" style="justify-content: flex-end; flex-direction: row; align-items: flex-end; min-width: unset; flex: 0;">
                <button class="btn btn-primary" onclick="fetchFile()">讀取</button>
            </div>
        </div>
        <div class="load-status" id="loadStatus"></div>
    </div>

    <div id="editorArea" style="display:none;">
        <!-- Official -->
        <div class="section" id="officialSection">
            <div class="section-header" onclick="toggleSection('officialSection')">
                <button class="section-toggle" title="折疊">▾</button>
                <h2>官方網站 <span class="badge" id="offCount">0</span></h2>
                <button class="btn btn-add" onclick="event.stopPropagation();addItem('official')">＋ 新增</button>
            </div>
            <div class="section-body">
                <div id="officialList"></div>
            </div>
        </div>

        <!-- Tool -->
        <div class="section" id="toolSection">
            <div class="section-header" onclick="toggleSection('toolSection')">
                <button class="section-toggle" title="折疊">▾</button>
                <h2>相關工具 <span class="badge" id="toolCount">0</span></h2>
                <button class="btn btn-add" onclick="event.stopPropagation();addItem('tool')">＋ 新增</button>
            </div>
            <div class="section-body">
                <div id="toolList"></div>
            </div>
        </div>
    </div>

    <!-- 固定儲存列已移至頂欄 -->

    <script>
        const OWNER = 'shijinzakaue';
        const REPO = 'shijinzakaue.github.io';
        const BASE_PATH = 's';

        const tagLabels = {
            "\u516c\u5f0f": "\u516c\u5f0f",
            "item": "\u30a2\u30a4\u30c6\u30e0\u30fb\u611b\u7528\u54c1",
            "clothes": "\u79c1\u670d\u30fb\u8863\u88c5\u30fb\u5236\u670d",
            "place": "\u5834\u6240\u30fb\u8056\u5730\u5de1\u79ae",
            "sns": "SNS",
            "blog": "\u30d6\u30ed\u30b0",
            "meet": "\u63e1\u624b\u30fb\u30df\u30fc\u30b0\u30ea",
            "information": "\u500b\u4eba\u30fb\u30b0\u30eb\u30fc\u30d7\u60c5\u5831",
            "song": "\u697d\u66f2\u8cc7\u6599",
            "sale": "\u58f2\u4e0a",
            "game": "\u30b2\u30fc\u30e0",
            "streaming": "\u30b9\u30c8\u30ea\u30fc\u30df\u30f3\u30b0\u30fb\u914d\u4fe1",
            "photo": "\u5199\u771f",
            "message": "\u30e1\u30c3\u30bb\u30fc\u30b8",
            "create": "\u4f5c\u6210\u30c4\u30fc\u30eb",
            "oshi": "\u63a8\u3057\u6d3b",
            "ranking": "\u30e9\u30f3\u30ad\u30f3\u30b0",
            "forum": "\u307e\u3068\u3081\u30fbRSS",
            "live": "\u30e9\u30a4\u30d6\u30fb\u30bb\u30c8\u30ea",
            "tool": "\u95a2\u9023\u30c4\u30fc\u30eb"
        };
        const groups = {
            "nogi": "\u4e43\u6728\u574246",
            "saku": "\u6afb\u574246",
            "hina": "\u65e5\u5411\u574246"
        };

        let currentSha = '';
        let dataStore = { officialConfig: [], toolConfig: [] };

        async function fetchFile() {
            const token = document.getElementById('token').value.trim();
            const file  = document.getElementById('fileName').value;
            const statusEl = document.getElementById('loadStatus');
            if (!token) { statusEl.textContent = '\u8acb\u5148\u8f38\u5165 Token'; statusEl.className = 'load-status err'; return; }
            statusEl.textContent = '\u8f09\u5165\u4e2d...'; statusEl.className = 'load-status';
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}/${file}`;
            try {
                const res  = await fetch(url, { headers: { Authorization: `token ${token}` } });
                const json = await res.json();
                if (!json.sha) throw new Error(json.message || 'Not found');
                currentSha = json.sha;
                const content = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
                parseJS(content);
                renderUI();
                document.getElementById('editorArea').style.display = 'block';
                document.getElementById('saveBar').style.visibility = 'visible';
                statusEl.textContent = '\u2713 \u8f09\u5165\u6210\u529f';
                statusEl.className = 'load-status';
            } catch (e) {
                statusEl.textContent = '\u2717 \u8f09\u5165\u5931\u6557\uff1a' + e.message;
                statusEl.className = 'load-status err';
            }
        }

        function parseJS(str) {
            try {
                const fn = new Function(`
                    var officialConfig, toolConfig, tagLabels, lastUpdated;
                    ${str}
                    return { officialConfig, toolConfig };
                `);
                const r = fn();
                dataStore.officialConfig = Array.isArray(r.officialConfig) ? r.officialConfig : [];
                dataStore.toolConfig     = Array.isArray(r.toolConfig)     ? r.toolConfig     : [];
            } catch (e) { alert('\u89e3\u6790\u5931\u6557\uff1a' + e.message); }
        }

        function esc(s) {
            return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function updateBadges() {
            document.getElementById('offCount').textContent  = dataStore.officialConfig.length;
            document.getElementById('toolCount').textContent = dataStore.toolConfig.length;
        }

        function renderUI() {
            document.getElementById('officialList').innerHTML = '';
            document.getElementById('toolList').innerHTML = '';
            dataStore.officialConfig.forEach((item, i) => document.getElementById('officialList').appendChild(createOfficialCard(item, i)));
            dataStore.toolConfig    .forEach((item, i) => document.getElementById('toolList')    .appendChild(createToolCard(item, i)));
            updateBadges();
        }

        function makeCard(headHTML, bodyEl) {
            const card = document.createElement('div');
            card.className = 'card';
            const head = document.createElement('div');
            head.className = 'card-head';
            head.innerHTML = headHTML;
            head.addEventListener('click', (e) => {
                if (e.target.closest('.drag-handle,.btn-danger')) return;
                card.classList.toggle('open');
            });
            card.appendChild(head);
            const body = document.createElement('div');
            body.className = 'card-body';
            body.appendChild(bodyEl);
            card.appendChild(body);
            return card;
        }

        function moveBtns(type, index) { /* replaced by drag */ }

        function makeDragHandle() {
            const h = document.createElement('div');
            h.className = 'drag-handle';
            h.textContent = '\u22ee\u22ee';
            h.title = '拖曳排序';
            return h;
        }

        function getCardIndex(card, type) {
            const list = document.getElementById(type === 'official' ? 'officialList' : 'toolList');
            return Array.from(list.children).indexOf(card);
        }

        function setupDrag(card, type) {
            const handle = card.querySelector('.drag-handle');
            handle.addEventListener('pointerdown', (e) => {
                if (e.button !== 0) return;
                e.preventDefault();
                handle.setPointerCapture(e.pointerId);
                card.classList.add('dragging');

                const list = document.getElementById(type === 'official' ? 'officialList' : 'toolList');
                const indicator = document.createElement('div');
                indicator.className = 'drop-indicator';
                let dropIndex = -1;

                const onMove = (ev) => {
                    card.style.pointerEvents = 'none';
                    const el = document.elementFromPoint(ev.clientX, ev.clientY);
                    card.style.pointerEvents = '';
                    indicator.remove();
                    const target = el && el.closest('.card');
                    if (!target || target === card || !target.closest('#' + type + 'List')) {
                        dropIndex = -1;
                        return;
                    }
                    const cards = Array.from(list.children);
                    const tIdx = cards.indexOf(target);
                    const rect = target.getBoundingClientRect();
                    if (ev.clientY < rect.top + rect.height / 2) {
                        target.before(indicator);
                        dropIndex = tIdx;
                    } else {
                        target.after(indicator);
                        dropIndex = tIdx + 1;
                    }
                };

                const onUp = () => {
                    handle.removeEventListener('pointermove', onMove);
                    handle.removeEventListener('pointerup', onUp);
                    card.classList.remove('dragging');
                    card.style.pointerEvents = '';
                    indicator.remove();
                    if (dropIndex !== -1) {
                        const cards = Array.from(list.children);
                        const fromIndex = cards.indexOf(card);
                        if (fromIndex !== -1 && dropIndex !== fromIndex && dropIndex !== fromIndex + 1) {
                            const arr = dataStore[`${type}Config`];
                            const [removed] = arr.splice(fromIndex, 1);
                            const actualTo = dropIndex > fromIndex ? dropIndex - 1 : dropIndex;
                            arr.splice(actualTo, 0, removed);
                            renderUI();
                        }
                    }
                };

                handle.addEventListener('pointermove', onMove);
                handle.addEventListener('pointerup', onUp);
            });
        }

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('collapsed');
        }

        function createOfficialCard(item, index) {
            const headHTML = `
                <div style="flex:1;min-width:0;">
                    <div class="name">${esc(item.name) || '<span style="color:var(--muted)">\uff08\u672a\u547d\u540d\uff09</span>'}</div>
                    <div class="sub">${esc(item.link)}</div>
                </div>
                <span style="font-size:11px;color:var(--muted);flex-shrink:0;">${groups[item.group]||item.group||''}</span>
                <span class="chevron">\u25be</span>`;

            const body = document.createElement('div');
            body.innerHTML = `
                <div class="form-group"><label>\u540d\u7a31</label>
                    <input type="text" value="${esc(item.name)}" placeholder="\u540d\u7a31"></div>
                <div class="form-group"><label>\u9023\u7d50</label>
                    <input type="text" value="${esc(item.link)}" placeholder="https://..."></div>
                <div class="form-group"><label>\u6240\u5c6c</label>
                    <select>${Object.entries(groups).map(([k,v])=>`<option value="${k}"${item.group===k?' selected':''}>${v}</option>`).join('')}</select></div>`;
            body.querySelector('input[placeholder="\u540d\u7a31"]').addEventListener('input', e => { updateValue('official',index,'name',e.target.value); });
            body.querySelector('input[placeholder="https://..."]').addEventListener('input', e => updateValue('official',index,'link',e.target.value));
            body.querySelector('select').addEventListener('change', e => updateValue('official',index,'group',e.target.value));

            const actions = document.createElement('div');
            actions.className = 'card-actions';
            const del = document.createElement('button');
            del.className = 'btn btn-danger'; del.textContent = '\u522a\u9664';
            del.addEventListener('click', () => removeItem('official', index));
            actions.appendChild(del);
            body.appendChild(actions);

            const card = makeCard(headHTML, body);
            const handle = makeDragHandle();
            card.querySelector('.card-head').prepend(handle);
            setupDrag(card, 'official');
            return card;
        }

        function createToolCard(item, index) {
            const headHTML = `
                <div style="flex:1;min-width:0;">
                    <div class="name">${esc(item.name) || '<span style="color:var(--muted)">\uff08\u672a\u547d\u540d\uff09</span>'}</div>
                    <div class="sub">${esc(item.desc)}</div>
                </div>
                <span class="chevron">\u25be</span>`;

            const body = document.createElement('div');

            [['\u6a19\u984c','name',item.name,''],
             ['\u526f\u6a19\u984c / \u8aaa\u660e','desc',item.desc,''],
             ['\u9023\u7d50\uff08\u9078\u586b\uff09','link',item.link,'https://...']].forEach(([lbl,key,val,ph]) => {
                const g = document.createElement('div'); g.className = 'form-group';
                g.innerHTML = `<label>${lbl}</label><input type="text" value="${esc(val)}" placeholder="${ph||lbl}">`;
                g.querySelector('input').addEventListener('input', e => updateValue('tool',index,key,e.target.value));
                body.appendChild(g);
            });

            const dg = document.createElement('div'); dg.className = 'form-group';
            dg.innerHTML = `<label>\u8a73\u7d30\u5167\u5bb9</label><textarea placeholder="\u652f\u63f4 Markdown \u9023\u7d50 [\u6587\u5b57](url)">${esc(item.detail)}</textarea>`;
            dg.querySelector('textarea').addEventListener('input', e => updateValue('tool',index,'detail',e.target.value));
            body.appendChild(dg);

            // groups
            const gg = document.createElement('div'); gg.className = 'form-group';
            gg.innerHTML = `<label>\u6240\u5c6c\u7d44\u5408</label><div class="check-grid"></div>`;
            Object.entries(groups).forEach(([k,v]) => {
                const lbl = document.createElement('label'); lbl.className = 'check-item';
                const cb  = document.createElement('input'); cb.type = 'checkbox';
                if (item.groups?.includes(k)) cb.checked = true;
                lbl.appendChild(cb); lbl.appendChild(document.createTextNode(v));
                cb.addEventListener('change', () => {
                    let grps = dataStore.toolConfig[index].groups || [];
                    grps = cb.checked ? [...new Set([...grps,k])] : grps.filter(x=>x!==k);
                    dataStore.toolConfig[index].groups = grps;
                });
                gg.querySelector('.check-grid').appendChild(lbl);
            });
            body.appendChild(gg);

            // tags
            const tg = document.createElement('div'); tg.className = 'form-group';
            tg.innerHTML = `<label>\u6a19\u7c64</label><div class="check-grid"></div>`;
            Object.entries(tagLabels).forEach(([k,v]) => {
                const lbl = document.createElement('label'); lbl.className = 'check-item';
                const cb  = document.createElement('input'); cb.type = 'checkbox';
                if (item.tags?.includes(k)) cb.checked = true;
                lbl.appendChild(cb); lbl.appendChild(document.createTextNode(v.split('\u30fb').pop()));
                cb.addEventListener('change', () => {
                    let tags = dataStore.toolConfig[index].tags || [];
                    tags = cb.checked ? [...new Set([...tags,k])] : tags.filter(x=>x!==k);
                    dataStore.toolConfig[index].tags = tags;
                });
                tg.querySelector('.check-grid').appendChild(lbl);
            });
            body.appendChild(tg);

            const actions = document.createElement('div'); actions.className = 'card-actions';
            const del = document.createElement('button'); del.className = 'btn btn-danger'; del.textContent = '\u522a\u9664';
            del.addEventListener('click', () => removeItem('tool', index));
            actions.appendChild(del);
            body.appendChild(actions);

            const card = makeCard(headHTML, body);
            const handle = makeDragHandle();
            card.querySelector('.card-head').prepend(handle);
            setupDrag(card, 'tool');
            return card;
        }

        function updateValue(type, i, key, val) { dataStore[`${type}Config`][i][key] = val; }
        function removeItem(type, i) { dataStore[`${type}Config`].splice(i,1); renderUI(); }
        function moveItem(type, i, dir) {
            const arr = dataStore[`${type}Config`];
            const t = i + dir;
            if (t >= 0 && t < arr.length) { [arr[i],arr[t]]=[arr[t],arr[i]]; renderUI(); }
        }
        function addItem(type) {
            if (type==='official') dataStore.officialConfig.push({name:'',link:'',group:'nogi'});
            else dataStore.toolConfig.push({name:'',desc:'',link:'',detail:'',tags:[],groups:['nogi']});
            renderUI();
            const list = document.getElementById(type==='official'?'officialList':'toolList');
            const last = list.lastElementChild;
            if (last) { last.classList.add('open'); last.scrollIntoView({behavior:'smooth',block:'center'}); }
        }

        async function saveToFile() {
            const token    = document.getElementById('token').value.trim();
            const file     = document.getElementById('fileName').value;
            const statusEl = document.getElementById('saveStatus');
            statusEl.textContent = '\u5132\u5b58\u4e2d...'; statusEl.className = '';
            const _p = n => String(n).padStart(2,'0');
            const _jst = new Date(Date.now() + 9 * 60 * 60 * 1000);
            const _ts = `${_jst.getUTCFullYear()}-${_p(_jst.getUTCMonth()+1)}-${_p(_jst.getUTCDate())} ${_p(_jst.getUTCHours())}:${_p(_jst.getUTCMinutes())}`;
            const newContent = `var lastUpdated = "${_ts}";\n\nvar officialConfig = ${JSON.stringify(dataStore.officialConfig, null, 2)};\n\nvar toolConfig = ${JSON.stringify(dataStore.toolConfig, null, 2)};\n\nvar tagLabels = ${JSON.stringify(tagLabels, null, 2)};`;
            const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${BASE_PATH}/${file}`;
            try {
                const res = await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Update ${file} via Editor`, content: btoa(unescape(encodeURIComponent(newContent))), sha: currentSha })
                });
                if (res.ok) {
                    const j = await res.json(); currentSha = j.content.sha;
                    statusEl.textContent = '\u2713 \u5132\u5b58\u6210\u529f\uff0c\u7d041\u5206\u9418\u5f8c\u751f\u6548'; statusEl.className = 'ok';
                } else {
                    const j = await res.json(); throw new Error(j.message);
                }
            } catch (e) {
                statusEl.textContent = '\u2717 \u5931\u6557\uff1a' + e.message; statusEl.className = 'err';
            }
        }
    </script>
</body>
</html>
