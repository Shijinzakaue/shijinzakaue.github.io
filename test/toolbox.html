<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具箱</title>
  <link rel="icon" href="LOGO.png" type="image/png" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111216;
      --panel: #1a1b21;
      --panel-2: #20222b;
      --text: #eceef7;
      --muted: #9ca3af;
      --accent: #933AFD;
      --nogi: #9E3EB2;
      --saku: #F19DB5;
      --hina: #5BBEE5;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; }

    .top-zone {
      position: sticky;
      top: 0;
      z-index: 20;
      background: linear-gradient(to bottom, rgba(147, 58, 253, 0.4) 0%, transparent 100%);
      padding: 16px 24px 32px 24px;
      display: flex;
      justify-content: center;
      transition: padding-left .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
    }
    .top-zone > * {
      pointer-events: auto;
    }

    .main-logo {
      position: fixed;
      top: 16px;
      left: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      overflow: hidden;
      box-shadow: 0 0 5px rgba(255,255,255,0.4);
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .main-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .search-wrap { display: inline-flex; align-items: center; justify-content: center; position: relative; max-width: 100%; }
    .search-pill {
      width: 50vw;
      max-width: 500px;
      height: 48px;
      border-radius: 999px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      padding: 0 48px 0 24px;
      transition: border-color .2s, box-shadow .2s;
      position: relative;
    }
    .search-pill:focus-within {
      border-color: color-mix(in oklab, var(--accent) 75%, white 25%);
      box-shadow: 0 0 0 3px rgba(147,58,253,.25);
    }

    #searchInput {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
      min-width: 0;
    }

    .search-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      position: absolute;
      right: 44px; /* Move search count inside */
    }
    #searchCount { 
      font-size: 13px; 
      color: var(--muted); 
      min-width: 38px; 
      text-align: right; 
      display: none;
    }

    #clearBtn {
      position: absolute;
      right: 8px; /* 32px width -> 16px radius. Right: 8px -> center is at 24px, matching outer 48px pill center */
      border: none;
      background: transparent;
      color: #9aa0ab;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      padding: 0;
      display: none;
      place-items: center;
      transition: background .15s ease, color .15s ease;
      font-size: 0;
    }
    #clearBtn.visible { display: grid; }
    #clearBtn:hover { background: rgba(255,255,255,.08); color: var(--text); }
    #clearBtn .material-icons { font-size: 18px; line-height: 1; }

    .search-icon {
      display: none;
      color: #9aa0ab;
      font-size: 24px;
    }

    .sidebar {
      position: fixed;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 66px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.05);
      border-radius: 66px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,.3);
    }

    #reportBtnContainer {
      position: fixed;
      right: 16px;
      bottom: 24px;
      width: 66px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 30;
    }

    #toTop { 
      position: relative;
      width: 60px;
      height: 60px;
      right: auto; 
      bottom: auto;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.8) translateY(20px);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1;
    }
    #toTop.visible {
      opacity: 1;
      visibility: visible;
      transform: scale(1) translateY(0);
    }
    #toTop.visible:hover {
      transform: scale(1.1);
    }

    .dock-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid transparent;
      background: transparent;
      color: #7b808f;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease, color .15s ease;
      font-size: 28px;
      flex-shrink: 0;
      text-decoration: none;
    }
    .dock-btn:hover { color: #eceef7; background: rgba(255,255,255,.05); }
    .dock-btn.active, .dock-btn.has-filters { background: rgba(147,58,253,.15); color: #d9d2ff; }
    .dock-btn .material-icons { font-size: 28px; line-height: 1; }
    .dock-btn img { width: 65%; height: 65%; object-fit: contain; filter: drop-shadow(0 1px 1px rgba(0,0,0,.35)); opacity: 0.8; }
    .dock-btn.active img { opacity: 1; }
    
    .filter-panel {
      position: fixed;
      right: 92px;
      top: 50%;
      transform: translateY(-50%) translateX(20px);
      opacity: 0;
      pointer-events: none;
      width: 230px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 14px;
      z-index: 29;
      box-shadow: 0 10px 28px rgba(0,0,0,.34);
      transition: opacity .2s ease, transform .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .filter-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .filter-title { font-size: 14px; color: #dfe2ed; font-weight: 700; }
    .clear-filters-btn {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: #9ca3af;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      cursor: pointer;
      transition: all .2s;
    }
    .clear-filters-btn:hover { background: rgba(255,255,255,.1); color: #eceef7; }
    
    .top-zone { transition: padding-right .2s cubic-bezier(0.175, 0.885, 0.32, 1.275); padding-right: 102px; margin-right: 0; }

    .container { 
      padding: 26px 102px 120px 20px;
      transition: padding-right .2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    body.filter-open .filter-panel {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%) translateX(0);
    }
    
    .filter-tags { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .filter-tag {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,.08);
      color: #9aa3af;
      background: rgba(255,255,255,.03);
      transition: all .2s;
      user-select: none;
    }
    .filter-tag.active {
      color: var(--t-color, #fff);
      background: color-mix(in srgb, var(--t-color) 15%, transparent);
      border-color: color-mix(in srgb, var(--t-color) 50%, transparent);
    }
    .filter-tag:hover:not(.active) {
      background: rgba(255,255,255,.08);
    }

    .official-panel {
      margin: 0 auto 32px;
      max-width: calc(360px * 3 + 16px * 2);
      width: 100%;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 24px;
    }
    .official-header {
      font-size: 16px;
      font-weight: 700;
      color: #dfe2ed;
      margin-bottom: 20px;
    }
    .official-group {
      display: flex;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .official-group.hide-border {
      border-bottom: none !important;
      margin-bottom: 0 !important;
      padding-bottom: 0 !important;
    }
    .official-group:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    .official-group-logo {
      width: 40px;
      height: 40px;
      margin-right: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .official-group-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.4));
    }
    .official-group-content {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 40px;
      gap: 12px 16px;
      overflow: hidden;
    }
    /* 當 group 尚未展開時，最多只顯示前面的項目，多餘的隱藏 */
    .official-group:not(.expanded) .official-group-content .official-item.hide-when-collapsed {
      display: none !important;
    }
    .official-item {
      height: 40px;
      background: rgba(36,32,50,.85);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 12px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      color: #e5e7eb;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .official-item:hover {
      transform: translateY(-2px);
      border-color: rgba(179,157,219,.3);
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      color: #fff;
    }
    .official-expand-container {
      display: flex;
      flex-direction: column;
      margin-left: 16px;
      flex-shrink: 0;
    }
    /* 在第一行推一個與 expand 高度相同的空白 */
    .official-expand-spacer {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .official-expand {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b8d98;
      background: rgba(255,255,255,.05);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .official-expand:hover { background: rgba(255,255,255,.1); color: #fff; }
    .official-expand .material-icons { font-size: 20px; transition: transform 0.3s; }
    .official-group.expanded .official-expand .material-icons { transform: rotate(180deg); }
    .official-group.expanded .official-expand { color: #d9d2ff; background: rgba(147,58,253,.15); }
    
    @media (max-width: 1200px) {
      .official-panel { max-width: calc(360px * 2 + 16px); }
      .official-group-content { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 800px) {
      .official-panel { max-width: 360px; padding: 20px; }
      .official-group-content { grid-template-columns: minmax(0, 1fr); }
      
      /* 單欄模式下縮小置頂區的 logo 與展開按鈕 */
      .official-group-logo {
        width: 32px;
        height: 32px;
        margin-right: 12px;
      }
      .official-expand-spacer {
        width: 32px;
        height: 32px;
        /* 在單欄下，上方墊高 40px 的 .official-item 高度再加上 17px 的 gap */
        height: 57px; 
        margin-bottom: 0; 
      }
      .official-expand {
        width: 32px;
        height: 32px;
      }
      .official-expand-container {
        margin-left: 12px;
        justify-content: flex-start;
      }
    }

    .cards {
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 360px));
      justify-content: center;
      gap: 16px;
      max-width: calc(360px * 3 + 16px * 2);
    }
    @media (max-width: 1200px) {
      .cards { grid-template-columns: repeat(2, minmax(0, 360px)); max-width: calc(360px * 2 + 16px); }
    }
    @media (max-width: 800px) {
      .cards { grid-template-columns: minmax(0, 360px); max-width: 360px; }
      .container { padding-right: 102px; padding-left: 20px; }
      .filter-panel { right: 104px; }
    }

    @media (max-width: 500px) {
      .sidebar { width: 53px; right: 13px; border-radius: 53px; padding: 6px 0; gap: 6px; }
      .dock-btn { width: 40px; height: 40px; font-size: 22px; }
      .dock-btn .material-icons { font-size: 22px; }
      #reportBtnContainer { width: 53px; right: 13px; bottom: 19px; gap: 12px; }
      #toTop { width: 53px; height: 53px; right: auto; bottom: auto; border-radius: 50%; }
      #toTop .material-icons { font-size: 24px; }
      .top-zone { padding: 19px 13px 19px 16px; justify-content: flex-end; }
      .container { padding-right: 80px; }

      .search-pill {
        width: 53px;
        height: 53px;
        padding: 0;
        cursor: pointer;
        justify-content: center;
        transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-radius 0.3s, background 0.2s, border-color 0.2s;
        border-radius: 50%;
        overflow: hidden;
      }
      .main-logo {
        top: 20.5px; /* 精準對齊高度 53px 搜尋按鈕的垂直中心：(19px top-padding + 53px/2) - (50px/2) = 45.5 - 25 = 20.5px */
        left: 13px; /* 貼齊側邊間距 */
        width: 50px;
        height: 50px;
      }
      .search-pill.expanded {
        width: calc(100vw - 87px); /* 扣除右側間距及左側 Logo 與安全距離 (13+50+8=71)，確保不遮擋 */
        height: 53px;
        border-radius: 26.5px;
        padding: 0 48px;
      }
      .search-icon {
        display: block;
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        transition: opacity 0.2s, transform 0.3s;
      }
      .search-pill.expanded .search-icon {
        left: 24px;
      }
      #searchInput {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .search-pill.expanded #searchInput {
        opacity: 1;
        pointer-events: auto;
      }
      .search-pill:not(.expanded) .search-meta,
      .search-pill:not(.expanded) #clearBtn {
        display: none !important;
      }
    }

    .tool-card {
      position: relative;
      width: 100%;
      background: transparent;
      color: var(--text);
      display: block;
      transition: transform .3s;
      cursor: pointer;
    }
    .tool-card:hover { transform: translateY(-4px); }

    .tool-header {
      position: relative;
      height: 90px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.06);
      background: rgba(36,32,50,.85);
      display: flex;
      align-items: center;
      padding: 0;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      transition: border-color .3s, box-shadow .3s;
      z-index: 2;
    }
    .tool-card:hover .tool-header { border-color: rgba(179,157,219,.3); box-shadow: 0 8px 24px rgba(0,0,0,.3); }

    .tool-info {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 70px 0 20px;
    }

    .name { 
      font-size: 15px; 
      font-weight: 700; 
      letter-spacing: .2px; 
      margin-bottom: 6px;
      color: #e5e7eb;
    }
    .name a { 
      color: var(--text); 
      text-decoration: none; 
      transition: color 0.2s; 
    }
    .name a:hover { 
      color: rgba(179,157,219,.95); 
    }

    .desc { 
      font-size: 13px; 
      color: #9aa2af; 
      font-weight: 400;
      line-height: 1.3;
    }

    .dots {
      position: absolute;
      right: 0;
      top: 18px;
      width: 64px;
      display: flex;
      gap: 5px;
      justify-content: center;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.nogi { background: var(--nogi); }
    .dot.saku { background: var(--saku); }
    .dot.hina { background: var(--hina); }

    .tool-detail {
      display: none;
      padding: 16px 20px;
      margin-top: 8px;
      font-size: 13px;
      color: #b0b5c0;
      line-height: 1.6;
      background: rgba(30,28,40,.6);
      border: 1px solid rgba(255,255,255,.04);
      border-radius: 16px;
    }
    .tool-card.expanded .tool-detail {
      display: block;
    }

    .card-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .card-tag {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }

    .expand {
      position: absolute;
      right: 16px;
      top: 42px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8b8d98;
      background: rgba(255,255,255,.05);
      border-radius: 50%;
      transition: color 0.2s, background 0.2s;
      z-index: 10;
    }
    .expand .material-icons { font-size: 20px; }
    .expand:hover { color: #eceef7; background: rgba(255,255,255,.1); }
    .tool-card.expanded .expand { color: #d9d2ff; background: rgba(147,58,253,.15); }

    .tool-card.match .tool-header {
      border-color: color-mix(in oklab, var(--accent) 75%, white 25%);
      box-shadow: 0 0 0 3px rgba(147,58,253,.25);
    }
    .tool-card.current .tool-header {
      border-color: color-mix(in oklab, var(--accent) 75%, white 25%);
      box-shadow: 0 0 0 3px rgba(147,58,253,.5);
    }

    .fab {
      position: fixed;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.14);
      background: var(--panel-2);
      color: #eceffc;
      display: grid;
      place-items: center;
      cursor: pointer;
      z-index: 28;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      text-decoration: none;
      transition: transform .2s ease, background .2s ease, opacity .2s ease, visibility .2s;
    }
    .fab:hover { transform: scale(1.1); background: rgba(147,58,253,.15); }
    .fab .material-icons { font-size: 30px; line-height: 1; }

    .info-modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s ease; backdrop-filter: blur(4px);
    }
    .info-modal-backdrop.open { opacity: 1; pointer-events: auto; }
    .info-modal {
      width: 90%; max-width: 400px; background: var(--panel); border: 1px solid rgba(255,255,255,.08); border-radius: 16px;
      padding: 24px; transform: translateY(20px); transition: transform .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 40px rgba(0,0,0,.5);
    }
    .info-modal-backdrop.open .info-modal { transform: translateY(0); }
    .info-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .close-info { background: transparent; border: none; color: #9ca3af; cursor: pointer; display: grid; place-items: center; padding: 4px; border-radius: 50%; font-size: 0; }
    .close-info:hover { color: #fff; background: rgba(255,255,255,.1); }
    .close-info .material-icons { font-size: 20px; }
    .info-modal-body p { margin-top: 0; margin-bottom: 12px; color: #b0b5c0; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="main-logo" id="mainLogo" title="更多資訊">
    <img src="LOGO.png" alt="工具箱 Logo">
  </div>

  <div class="top-zone">
    <div class="search-wrap" id="searchWrap">
      <div class="search-pill" id="searchPill">
        <span class="material-icons search-icon" id="searchIcon">search</span>
        <input id="searchInput" type="text" placeholder="搜尋工具..." />
        <div class="search-meta">
          <span id="searchCount">0/0</span>
        </div>
        <button id="clearBtn" aria-label="清除輸入"><span class="material-icons">close</span></button>
      </div>
    </div>
  </div>

  <aside class="sidebar" id="dock">
    <button class="dock-btn active" data-site="all" title="全部"><span class="material-icons">dashboard</span></button>
    <button class="dock-btn" data-site="nogi" title="乃木坂46"><img alt="乃木坂46" src="https://www.nogizaka46.com/files/46/page/31thSG_ul_xF2c/images/logo.svg" /></button>
    <button class="dock-btn" data-site="saku" title="櫻坂46"><img alt="櫻坂46" src="https://sakurazaka46.com/files/14/s46/img/com-logo-no-framed.svg" /></button>
    <button class="dock-btn" data-site="hina" title="日向坂46"><img alt="日向坂46" src="https://cdn.hinatazaka46.com/files/14/hinata/pages/4th_anniv/images/logo_hinata.svg" /></button>
    <button class="dock-btn" data-site="other" title="其他"><span class="material-icons">more_horiz</span></button>
    
    <div style="width: 40px; height: 1px; background: rgba(255,255,255,.08); margin: 4px 0;"></div>
    
    <button class="dock-btn" id="filterToggle" title="篩選"><span class="material-icons">tune</span></button>
  </aside>

  <div id="reportBtnContainer">
    <a id="toTop" class="fab" href="#" title="回到最頂"><span class="material-icons">arrow_upward</span></a>
  </div>

  <section class="filter-panel" id="filterPanel">
    <div class="filter-header">
      <div class="filter-title">篩選標籤</div>
      <button class="clear-filters-btn" id="clearFiltersBtn">清除篩選</button>
    </div>
    <div class="filter-tags" id="filterTags"></div>
  </section>

  <div class="info-modal-backdrop" id="infoModalDrop">
    <div class="info-modal" id="infoModal">
      <div class="info-modal-header">
        <h3 style="margin:0; font-size: 18px; color: #eceef7;">關於與建議</h3>
        <button class="close-info" id="closeInfoBtn"><span class="material-icons">close</span></button>
      </div>
      <div class="info-modal-body">
        <p>這是一個集成了多個快速跳轉或輔助資源的跨平台整合工具箱。</p>
        <p>如有任何功能失效、增加站點要求或相關建議，請隨時通知我們！<br><br><a href="mailto:feedback@example.com?subject=Toolbox%20Report" style="color:var(--accent);text-decoration:none;">立刻發送郵件</a></p>
      </div>
    </div>
  </div>

  <main class="container">
    <section class="official-panel" id="officialPanel" style="display: none;">
      <div class="official-header">公式サイト</div>
      <div class="official-groups" id="officialGroups"></div>
    </section>

    <div id="noResultsMsg" style="display: none; text-align: center; color: var(--muted); font-size: 16px; margin-top: 40px;">找不到工具...</div>
    <section class="cards" id="cards">
      <!-- 卡片內容將由 JavaScript 動態生成 -->
    </section>
  </main>

  <script src="config.js"></script>
  <script>
    const searchWrap = document.getElementById('searchWrap');
    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const countEl = document.getElementById('searchCount');
    const cardsContainer = document.getElementById('cards');

    // 動態生成顏色
    function stringToColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      return `hsl(${Math.abs(hash) % 360}, 75%, 65%)`;
    }

    let allTagsSet = new Set(['公式']);
    let activeSite = 'all';
    let matches = [];
    let currentIndex = 0;
    
    // 初始化卡片
    function initCards() {
      cardsContainer.innerHTML = '';
      toolConfig.forEach(tool => {
        tool.tags.forEach(t => allTagsSet.add(t));
        
        const dotsHtml = tool.groups.map(g => `<span class="dot ${g}"></span>`).join('');
        const tagsHtml = tool.tags.map(t => {
          const color = stringToColor(t);
          const label = (typeof tagLabels !== 'undefined' && tagLabels[t]) ? tagLabels[t] : t;
          return `<span class="card-tag" style="color: ${color}; background: color-mix(in srgb, ${color} 15%, transparent); border: 1px solid color-mix(in srgb, ${color} 30%, transparent);">${label}</span>`;
        }).join('');

        const el = document.createElement('div');
        el.className = 'tool-card';
        el.dataset.site = tool.groups.join(' ');
        el.dataset.tags = tool.tags.join(' ');
        el.dataset.href = tool.link;

        el.innerHTML = `
          <div class="tool-header">
            <div class="tool-info">
              <div class="name">${tool.name}</div>
              <div class="desc">${tool.desc}</div>
            </div>
            <div class="dots">${dotsHtml}</div>
          </div>
          <div class="expand"><span class="material-icons">expand_more</span></div>
          <div class="tool-detail">
            ${tool.detail}
            <div class="card-tags">${tagsHtml}</div>
          </div>
        `;
        cardsContainer.appendChild(el);
      });
    }

    // 初始化篩選器
    function initFilters() {
      const filterTagsContainer = document.getElementById('filterTags');
      if (!filterTagsContainer) return;
      filterTagsContainer.innerHTML = '';
      
      allTagsSet.forEach(t => {
        const color = stringToColor(t);
        const label = (typeof tagLabels !== 'undefined' && tagLabels[t]) ? tagLabels[t] : t;
        const btn = document.createElement('div');
        btn.className = 'filter-tag'; // 預設不常亮
        btn.dataset.value = t;
        btn.textContent = label;
        btn.style.setProperty('--t-color', color);
        
        btn.addEventListener('click', () => {
          btn.classList.toggle('active');
          applyFilters();
        });
        
        filterTagsContainer.appendChild(btn);
      });
    }

    function renderOfficial() {
      const panel = document.getElementById('officialPanel');
      const container = document.getElementById('officialGroups');
      if (!panel || !container) return;
      const oData = typeof officialConfig !== 'undefined' ? officialConfig : [];
      
      if (!oData.length) {
        panel.style.display = 'none';
        return;
      }
      
      container.innerHTML = '';
      
      const groupsToOrder = [
        { id: 'nogi', logo: 'https://www.nogizaka46.com/files/46/page/31thSG_ul_xF2c/images/logo.svg' },
        { id: 'saku', logo: 'https://sakurazaka46.com/files/14/s46/img/com-logo-no-framed.svg' },
        { id: 'hina', logo: 'https://cdn.hinatazaka46.com/files/14/hinata/pages/4th_anniv/images/logo_hinata.svg' }
      ];
      
      groupsToOrder.forEach(g => {
        const items = oData.filter(i => i.group === g.id);
        if (!items.length) return;
        
        // 這裡隱性標記它們都含有公式類別，以防之後要用到
        
        const groupEl = document.createElement('div');
        groupEl.className = 'official-group';
        groupEl.dataset.group = g.id;
        
        // 建立左側團體 Logo 區塊
        const logoEl = document.createElement('div');
        logoEl.className = 'official-group-logo';
        logoEl.innerHTML = `<img src="${g.logo}" alt="${g.id}">`;
        
        const contentEl = document.createElement('div');
        contentEl.className = 'official-group-content';
        
        items.forEach(item => {
          const a = document.createElement('a');
          a.className = 'official-item';
          a.href = item.link;
          a.target = '_blank';
          a.textContent = item.name;
          a.dataset.name = item.name;
          contentEl.appendChild(a);
        });
        
        // 建立右邊展開按鈕的區塊（上方放一個空位，佔據第一行的空間，把按鈕推到第二行）
        const expandContainer = document.createElement('div');
        expandContainer.className = 'official-expand-container';
        
        const expandSpacer = document.createElement('div');
        expandSpacer.className = 'official-expand-spacer';
        
        const expandBtn = document.createElement('div');
        expandBtn.className = 'official-expand';
        expandBtn.innerHTML = '<span class="material-icons">expand_more</span>';
        expandBtn.addEventListener('click', () => {
          groupEl.classList.toggle('expanded');
          updateOfficialVisibility();
        });
        
        expandContainer.appendChild(expandSpacer);
        expandContainer.appendChild(expandBtn);
        
        groupEl.appendChild(logoEl);
        groupEl.appendChild(contentEl);
        groupEl.appendChild(expandContainer);
        container.appendChild(groupEl);
      });
      
      updateOfficialVisibility();
    }

    function updateOfficialVisibility() {
      const panel = document.getElementById('officialPanel');
      if (!panel) return;
      let panelVisible = false;
      const q = input.value.trim().toLowerCase();
      
      const cols = window.innerWidth > 1200 ? 3 : (window.innerWidth > 800 ? 2 : 1);
      const maxItems = cols * 2;

      let visibleGroups = [];

      // 檢查是否應該隱藏（標籤過濾但未包含 '公式'）
      const selected = selectedTags();
      const hideBecauseTag = selected.length > 0 && !selected.includes('公式');

      if (hideBecauseTag) {
        panel.style.display = 'none';
        return;
      }

      document.querySelectorAll('.official-group').forEach(groupEl => {
        const groupId = groupEl.dataset.group;
        const matchFilter = activeSite === 'all' || activeSite === groupId;
        
        let visibleCount = 0;
        const items = groupEl.querySelectorAll('.official-item');
        
        let totalMatchCount = 0;
        items.forEach(a => {
          const matchSearch = !q || a.dataset.name.toLowerCase().includes(q);
          const isMatch = matchFilter && matchSearch;
          
          if (isMatch) {
             totalMatchCount++;
             a.style.display = 'flex';
             if (q) {
               a.style.borderColor = 'color-mix(in oklab, var(--accent) 75%, white 25%)';
               a.style.boxShadow = '0 0 0 3px rgba(147,58,253,.25)';
             } else {
               a.style.borderColor = '';
               a.style.boxShadow = '';
             }
             
             visibleCount++;
             if (!groupEl.classList.contains('expanded') && visibleCount > maxItems) {
               a.classList.add('hide-when-collapsed');
             } else {
               a.classList.remove('hide-when-collapsed');
             }
          } else {
             a.style.display = 'none';
             a.classList.remove('hide-when-collapsed');
          }
        });
        
        const expandContainer = groupEl.querySelector('.official-expand-container');
        
        if (totalMatchCount > maxItems) {
          expandContainer.style.display = 'flex';
        } else {
          expandContainer.style.display = 'none';
          groupEl.classList.remove('expanded');
        }
        
        if (totalMatchCount > 0) {
          groupEl.style.display = 'flex';
          groupEl.classList.remove('hide-border');
          visibleGroups.push(groupEl);
          panelVisible = true;
        } else {
          groupEl.style.display = 'none';
        }
      });
      
      // 最後一個可見的 group 隱藏底線
      if (visibleGroups.length > 0) {
        visibleGroups[visibleGroups.length - 1].classList.add('hide-border');
      }
      
      const oDataExists = typeof officialConfig !== 'undefined' && officialConfig.length > 0;
      if (!oDataExists) panelVisible = false;
      
      const realPanel = document.getElementById('officialPanel');
      if (realPanel) {
        realPanel.style.display = panelVisible ? 'block' : 'none';
      }
    }

    initCards();
    initFilters();
    renderOfficial();
    window.addEventListener('resize', updateOfficialVisibility);

    const cards = [...document.querySelectorAll('.tool-card')];

    // 卡片點擊邏輯
    document.addEventListener('click', (e) => {
      const card = e.target.closest('.tool-card');
      if (!card) return;

      const expandBtn = e.target.closest('.expand');
      const toolDetail = e.target.closest('.tool-detail');
      const toolHeader = e.target.closest('.tool-header');
      
      if (expandBtn) {
        // 點擊展開按鈕：切換展開狀態
        card.classList.toggle('expanded');
        const icon = expandBtn.querySelector('.material-icons');
        icon.textContent = card.classList.contains('expanded') ? 'expand_less' : 'expand_more';
      } else if (toolDetail) {
        // 點擊展開的詳細內容：不要連去網頁，也不要收合（讓使用者可以複製文字）
        return;
      } else if (toolHeader) {
        // 點擊卡片頭部：打開連結
        const href = card.dataset.href;
        if (href) window.open(href, '_blank');
      }
    });

    const dockBtns = [...document.querySelectorAll('.sidebar .dock-btn[data-site]')];
    const filterToggle = document.getElementById('filterToggle');
    const filterPanel = document.getElementById('filterPanel');

    function selectedTags() {
      return [...document.querySelectorAll('.filter-tag.active')].map(c => c.dataset.value);
    }

    function cardVisible(card) {
      const sites = (card.dataset.site || 'other').split(/\s+/).filter(Boolean);
      const tags = (card.dataset.tags || '').split(/\s+/).filter(Boolean);
      const bySite = activeSite === 'all' ? true : sites.includes(activeSite);
      const selected = selectedTags();
      const byTag = selected.length ? tags.some(t => selected.includes(t)) : true;
      return bySite && byTag;
    }

    function applyFilters() {
      // 根據選中的標籤數決定 filterToggle 是否高亮
      if (selectedTags().length > 0) {
        filterToggle.classList.add('has-filters');
      } else {
        filterToggle.classList.remove('has-filters');
      }

      runSearch(false);
    }

    function clearHighlights() {
      cards.forEach(c => c.classList.remove('match', 'current'));
    }

    function updateCount() {
      const q = input.value.trim();
      clearBtn.classList.toggle('visible', q.length > 0);
      if (!q) {
        countEl.style.display = 'none';
      } else {
        countEl.style.display = 'block';
        if (!matches.length) countEl.textContent = '0/0';
        else countEl.textContent = `${currentIndex + 1}/${matches.length}`;
      }
    }

    function runSearch(advance = false) {
      clearHighlights();
      const q = input.value.trim().toLowerCase();
      let hasVisibleCard = false;

      updateOfficialVisibility();
      let hasOfficial = false;
      const officialPanel = document.getElementById('officialPanel');
      if (officialPanel && window.getComputedStyle(officialPanel).display !== 'none') {
        hasOfficial = true;
      }

      const selected = selectedTags();
      
      if (!q) {
        matches = [];
        currentIndex = 0;
        cards.forEach(card => {
          const isVisible = cardVisible(card);
          card.style.display = isVisible ? 'block' : 'none';
          if (isVisible) hasVisibleCard = true;
        });
        updateCount();
        document.getElementById('noResultsMsg').style.display = (hasVisibleCard || hasOfficial) ? 'none' : 'block';
        return;
      }

      const visibleCards = cards.filter(c => cardVisible(c));
      
      matches = visibleCards.filter(card => {
        const nameText = card.querySelector('.name')?.textContent || '';
        const descText = card.querySelector('.desc')?.textContent || '';
        const tagTokens = card.dataset.tags || '';
        const tagLabelsText = card.querySelector('.card-tags')?.textContent || '';
        const text = `${nameText} ${descText} ${tagTokens} ${tagLabelsText}`.toLowerCase();
        return text.includes(q);
      });

      cards.forEach(card => {
        if (matches.includes(card)) {
          // 若同時在官網區塊中有結果被搜尋到時，下方的網頁卡片搜尋結果可考慮不顯示（依照要求：搜尋結果排除置頂結果，因此我們在這裡隱藏重複出現的）
          // 但是我們這裡其實很難精準對應置頂的內容，通常所謂的置頂卡片指的是：如果他在上面找到了，下面就不要顯示相同的東西。
          // 我們這裡先只負責依您的要求：將一般卡片獨立顯示即可。若他有 公式 標籤且面板已經因為搜尋而有結果，下方就不顯示。
          
          let skipBecauseOfOfficial = false;
          if (hasOfficial) {
             const isMatchThisOfficialItem = Array.from(document.querySelectorAll('.official-item')).some(oi => {
               return oi.style.display !== 'none' && oi.dataset.name.toLowerCase() === card.querySelector('.name').textContent.toLowerCase();
             });
             // 若上方有了，下方這個就藏起來
             if (isMatchThisOfficialItem) {
               skipBecauseOfOfficial = true;
             }
          }
          
          if (!skipBecauseOfOfficial) {
            card.style.display = 'block';
            card.classList.add('match');
            hasVisibleCard = true;
          } else {
            card.style.display = 'none';
          }
        } else {
          card.style.display = 'none';
        }
      });
      
      // 更新有效 matches
      matches = matches.filter(card => card.style.display === 'block');

      if (!matches.length) {
        currentIndex = 0;
        updateCount();
        document.getElementById('noResultsMsg').style.display = hasOfficial ? 'none' : 'block';
        return;
      }

      document.getElementById('noResultsMsg').style.display = 'none';

      if (advance) currentIndex = (currentIndex + 1) % matches.length;
      else if (currentIndex >= matches.length) currentIndex = 0;
      if (matches[currentIndex]) {
        const current = matches[currentIndex];
        current.classList.add('current');
        current.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      updateCount();
    }

    input.addEventListener('focus', () => searchWrap.classList.add('focused'));
    input.addEventListener('blur', () => {
      if (!input.value.trim()) searchWrap.classList.remove('focused');
    });

    input.addEventListener('input', () => {
      currentIndex = 0;
      runSearch(false);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        runSearch(true);
      }
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      searchWrap.classList.remove('focused');
      runSearch(false);
      input.focus();
    });

    dockBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        dockBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSite = btn.dataset.site || 'all';
        applyFilters();
      });
    });

    const toTopBtn = document.getElementById('toTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 150) {
        toTopBtn.classList.add('visible');
      } else {
        toTopBtn.classList.remove('visible');
      }
    });

    const searchPill = document.getElementById('searchPill');
    
    searchPill.addEventListener('click', (e) => {
      if (window.innerWidth <= 600 && !searchPill.classList.contains('expanded')) {
        searchPill.classList.add('expanded');
        setTimeout(() => input.focus(), 100);
      }
    });

    document.addEventListener('click', (e) => {
      if (window.innerWidth <= 600) {
        if (!searchPill.contains(e.target) && input.value.trim() === '') {
          searchPill.classList.remove('expanded');
        }
      }
    });

    filterToggle.addEventListener('click', () => {
      document.body.classList.toggle('filter-open');
      filterToggle.classList.toggle('active');
    });

    document.addEventListener('click', (e) => {
      if (!filterPanel.contains(e.target) && e.target !== filterToggle && !filterToggle.contains(e.target)) {
        document.body.classList.remove('filter-open');
        filterToggle.classList.remove('active');
      }
    });

    document.getElementById('clearFiltersBtn').addEventListener('click', () => {
      document.querySelectorAll('.filter-tag.active').forEach(tag => tag.classList.remove('active'));
      applyFilters();
    });

    const infoModalDrop = document.getElementById('infoModalDrop');
    const closeInfoBtn = document.getElementById('closeInfoBtn');

    document.getElementById('mainLogo').addEventListener('click', () => {
      infoModalDrop.classList.add('open');
    });

    closeInfoBtn.addEventListener('click', () => {
      infoModalDrop.classList.remove('open');
    });
    
    infoModalDrop.addEventListener('click', (e) => {
      if (e.target === infoModalDrop) {
        infoModalDrop.classList.remove('open');
      }
    });

    toTopBtn.addEventListener('click', (e) => {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    applyFilters();
  </script>
</body>
</html>
